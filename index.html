<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>ELITE LAGA | LOGIN & ARENA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; font-family: 'Inter', sans-serif; color: #f8fafc; width: 1200px; margin: 0 auto; overflow-x: hidden; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-border { border: 1px solid rgba(59, 130, 246, 0.5); box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        #authSection { display: flex; position: fixed; inset: 0; z-index: 100; background: #020617; justify-content: center; align-items: center; }
        #gameSection { display: none; padding: 40px; }
    </style>
</head>
<body>

    <div id="authSection">
        <div class="glass p-12 rounded-[3rem] w-[500px] text-center neon-border">
            <h1 class="font-orbitron text-4xl font-black text-yellow-500 mb-2 italic">ELITE LAGA</h1>
            <p class="text-slate-500 text-xs uppercase tracking-[0.4em] mb-10">Access the Pro Arena</p>
            
            <div class="space-y-6">
                <input type="text" id="username" class="w-full bg-slate-950 border border-slate-800 p-5 rounded-2xl outline-none focus:border-yellow-500 text-center font-bold" placeholder="USERNAME">
                <input type="password" id="password" class="w-full bg-slate-950 border border-slate-800 p-5 rounded-2xl outline-none focus:border-yellow-500 text-center font-bold" placeholder="PASSWORD">
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="handleAuth('login')" class="bg-slate-800 hover:bg-slate-700 py-5 rounded-2xl font-black font-orbitron transition">LOGIN</button>
                    <button onclick="handleAuth('register')" class="bg-yellow-600 hover:bg-yellow-500 py-5 rounded-2xl font-black font-orbitron text-black transition">DAFTAR</button>
                </div>
            </div>
        </div>
    </div>

    <div id="gameSection">
        <nav class="flex justify-between items-center mb-10 glass p-8 rounded-[2.5rem]">
            <div class="flex items-center gap-4">
                <div class="h-12 w-12 bg-yellow-500 rounded-xl flex items-center justify-center font-black text-black text-2xl font-orbitron">L</div>
                <h2 id="userDisplay" class="font-orbitron text-xl font-bold italic tracking-widest uppercase">PLAYER</h2>
            </div>
            <div class="flex gap-6">
                <div class="glass px-8 py-3 rounded-2xl border-l-4 border-yellow-500">
                    <p class="text-[9px] text-slate-500 font-bold uppercase">Main Balance</p>
                    <h2 id="balanceTxt" class="text-2xl font-orbitron font-black text-yellow-400 italic">Rp 0</h2>
                </div>
                <button onclick="logout()" class="text-red-500 font-bold uppercase text-xs hover:underline">Exit</button>
            </div>
        </nav>

        <div class="grid grid-cols-2 gap-10">
            </div>

        <video autoplay muted loop class="w-full h-64 object-cover rounded-3xl mt-10 opacity-30">
            <source src="36577.mp4" type="video/mp4">
        </video>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            // GANTI DENGAN PUNYA ANDA
            apiKey: "...", databaseURL: "..." 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.handleAuth = (type) => {
            const user = document.getElementById('username').value.toLowerCase();
            const pass = document.getElementById('password').value;
            if(!user || !pass) return alert("Isi data!");

            const userRef = ref(db, 'users/' + user);
            onValue(userRef, (snapshot) => {
                const data = snapshot.val();
                if(type === 'login') {
                    if(data && data.password === pass) {
                        sessionStorage.setItem('activeUser', user);
                        location.reload();
                    } else { alert("User tidak ditemukan/salah pass"); }
                } else {
                    if(data) { alert("Username sudah ada!"); }
                    else {
                        set(userRef, { password: pass, balance: 0, status: 'user' });
                        alert("Berhasil Daftar! Silahkan Login.");
                    }
                }
            }, { onlyOnce: true });
        };

        // CEK LOGIN STATUS
        const activeUser = sessionStorage.getItem('activeUser');
        if(activeUser) {
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('gameSection').style.display = 'block';
            document.getElementById('userDisplay').innerText = activeUser;
            
            // Sync Saldo Realtime
            onValue(ref(db, 'users/' + activeUser), (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('balanceTxt').innerText = `Rp ${data.balance.toLocaleString()}`;
                }
            });
        }
        
        window.logout = () => { sessionStorage.clear(); location.reload(); };
    </script>
</body>
</html>
