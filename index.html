<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrabMedia Ultra | Advanced Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #070913; /* Warna gelap biru malam */
            color: #f8fafc;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        
        /* Background Glow yang Halus */
        .bg-glow {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: 
                radial-gradient(circle at 15% 50%, rgba(79, 70, 229, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.1), transparent 25%);
            z-index: -1;
            pointer-events: none;
        }

        /* Teks Gradasi Animasi */
        .text-gradient-animate {
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: textShine 4s linear infinite;
        }
        @keyframes textShine {
            to { background-position: 200% center; }
        }

        /* Panel Kaca (Glassmorphism) Smooth */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Hover Tombol Smooth */
        .btn-smooth {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-smooth:hover {
            transform: translateY(-4px) scale(1.01);
        }
        .btn-smooth:active {
            transform: translateY(0px) scale(0.98);
        }

        /* Toast Animasi */
        .toast-enter { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .toast-exit { animation: slideDown 0.3s forwards; }
        @keyframes slideUp {
            from { transform: translate(-50%, 120%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        @keyframes slideDown {
            from { transform: translate(-50%, 0); opacity: 1; }
            to { transform: translate(-50%, 120%); opacity: 0; }
        }
    </style>
</head>
<body class="antialiased min-h-screen pb-20 selection:bg-indigo-500/30">
    <div class="bg-glow"></div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white text-slate-900 px-6 py-4 rounded-full font-bold shadow-2xl flex items-center gap-3 hidden z-50">
        <div class="bg-emerald-500 text-white rounded-full p-1"><i data-lucide="check" class="w-4 h-4"></i></div>
        Link berhasil disalin!
    </div>

    <div class="max-w-5xl mx-auto px-5 py-8 md:py-12">
        
        <header class="flex justify-center mb-10 md:mb-16">
            <div class="glass-panel px-6 py-3 flex items-center gap-3 rounded-full bg-white/5 border-white/10">
                <i data-lucide="sparkles" class="text-indigo-400 w-5 h-5"></i>
                <h1 class="text-lg font-extrabold tracking-widest">GRAB<span class="text-indigo-400">MEDIA</span></h1>
            </div>
        </header>

        <div class="max-w-2xl mx-auto text-center mb-10">
            <h2 class="text-4xl md:text-6xl font-black mb-6 tracking-tight leading-[1.1]">
                Satu Link, <br class="md:hidden" />
                <span class="text-gradient-animate bg-gradient-to-r from-indigo-400 via-purple-400 to-indigo-400">Banyak Pilihan.</span>
            </h2>
            
            <div class="glass-panel p-2 flex flex-col md:flex-row gap-2 mt-8 relative z-10 focus-within:ring-2 ring-indigo-500/50 transition-all rounded-[2rem] bg-black/20">
                <div class="relative flex-1 flex items-center pl-4">
                    <i data-lucide="link" class="absolute left-6 text-slate-400 w-5 h-5"></i>
                    <input type="text" id="url-input" 
                        placeholder="https://vt.tiktok.com/..." 
                        class="w-full bg-transparent py-4 pl-12 pr-4 outline-none text-white text-lg placeholder:text-slate-500 font-medium">
                </div>
                <button onclick="processLink()" id="main-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-4 rounded-full font-bold transition-all flex items-center justify-center gap-2 shadow-lg shadow-indigo-500/20 w-full md:w-auto">
                    <span id="btn-text">Analisa Link</span>
                    <i data-lucide="search" id="btn-icon" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <div class="max-w-2xl mx-auto mb-16">
            <div class="bg-gradient-to-r from-indigo-900/40 to-purple-900/40 border border-indigo-500/30 rounded-2xl p-4 sm:p-5 flex flex-col sm:flex-row items-center gap-4 relative overflow-hidden group cursor-pointer hover:border-indigo-400/60 transition-all">
                <div class="absolute top-0 right-0 bg-indigo-500/20 text-indigo-300 text-[10px] px-3 py-1 rounded-bl-lg font-bold uppercase tracking-wider">Sponsor</div>
                
                <div class="w-12 h-12 bg-indigo-500/20 rounded-xl flex items-center justify-center text-2xl shrink-0">🚀</div>
                <div class="text-center sm:text-left flex-1">
                    <h4 class="font-bold text-white text-base md:text-lg">Tingkatkan Bisnismu Disini!</h4>
                    <p class="text-sm text-indigo-200/70 mt-1">Pasang iklan di GrabMedia dan jangkau ribuan pengunjung setiap hari.</p>
                </div>
                <a href="#" class="px-6 py-2.5 bg-white text-indigo-950 hover:bg-indigo-50 rounded-full text-sm font-bold transition-all whitespace-nowrap w-full sm:w-auto text-center">Pasang Iklan</a>
            </div>
        </div>

        <div id="result-container" class="hidden animate-in fade-in slide-in-from-bottom-8 duration-700">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <div class="lg:col-span-5 space-y-6">
                    <div class="glass-panel p-4 flex flex-col items-center border border-white/5 bg-gradient-to-b from-white/5 to-transparent">
                        <div class="w-full aspect-[9/16] bg-black rounded-2xl overflow-hidden relative shadow-2xl mb-5 group">
                            <video id="res-video" controls class="w-full h-full object-contain"></video>
                            <div class="absolute top-3 left-3 bg-black/60 backdrop-blur-md px-3 py-1.5 rounded-full text-xs font-bold text-emerald-400 flex items-center gap-1.5">
                                <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div> Ready
                            </div>
                        </div>
                        
                        <div class="w-full flex items-center gap-4 p-4 bg-white/5 rounded-2xl border border-white/5">
                            <img id="res-avatar" src="" class="w-12 h-12 rounded-full border border-white/20">
                            <div class="flex-1 overflow-hidden">
                                <h3 id="res-author" class="font-bold text-base truncate">@username</h3>
                                <p class="text-[11px] text-slate-400 uppercase tracking-widest mt-0.5">Content Creator</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-7 space-y-6">
                    
                    <div class="glass-panel p-6 md:p-8 bg-gradient-to-br from-white/5 to-transparent">
                        <p id="res-title" class="text-lg text-slate-300 mb-8 font-medium leading-relaxed italic">"Caption video..."</p>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <button onclick="openLink('videoNoWm')" class="btn-smooth flex items-center justify-between p-5 bg-indigo-600/20 hover:bg-indigo-600 rounded-2xl border border-indigo-500/30 text-indigo-50 shadow-[0_0_15px_rgba(79,70,229,0.15)]">
                                <div class="flex items-center gap-4">
                                    <div class="bg-white/10 p-2 rounded-lg"><i data-lucide="download-cloud" class="w-5 h-5"></i></div>
                                    <div class="text-left"><p class="font-bold">Video HD</p><p class="text-xs text-indigo-200/70 mt-0.5">Tanpa Watermark</p></div>
                                </div>
                                <i data-lucide="external-link" class="w-4 h-4 opacity-50"></i>
                            </button>
                            
                            <button onclick="openLink('videoWm')" class="btn-smooth flex items-center justify-between p-5 bg-slate-800/50 hover:bg-slate-700 rounded-2xl border border-white/10 text-slate-200">
                                <div class="flex items-center gap-4">
                                    <div class="bg-white/10 p-2 rounded-lg"><i data-lucide="video" class="w-5 h-5"></i></div>
                                    <div class="text-left"><p class="font-bold">Video Asli</p><p class="text-xs text-slate-400 mt-0.5">Dengan Watermark</p></div>
                                </div>
                                <i data-lucide="external-link" class="w-4 h-4 opacity-50"></i>
                            </button>

                            <button onclick="openLink('audio')" class="btn-smooth flex items-center justify-between p-5 bg-pink-600/20 hover:bg-pink-600 rounded-2xl border border-pink-500/30 text-pink-50 shadow-[0_0_15px_rgba(236,72,153,0.1)]">
                                <div class="flex items-center gap-4">
                                    <div class="bg-white/10 p-2 rounded-lg"><i data-lucide="music-4" class="w-5 h-5"></i></div>
                                    <div class="text-left"><p class="font-bold">Audio MP3</p><p class="text-xs text-pink-200/70 mt-0.5">Musik Original</p></div>
                                </div>
                                <i data-lucide="external-link" class="w-4 h-4 opacity-50"></i>
                            </button>

                            <button onclick="openLink('cover')" class="btn-smooth flex items-center justify-between p-5 bg-emerald-600/20 hover:bg-emerald-600 rounded-2xl border border-emerald-500/30 text-emerald-50">
                                <div class="flex items-center gap-4">
                                    <div class="bg-white/10 p-2 rounded-lg"><i data-lucide="image" class="w-5 h-5"></i></div>
                                    <div class="text-left"><p class="font-bold">Thumbnail</p><p class="text-xs text-emerald-200/70 mt-0.5">Gambar Cover HD</p></div>
                                </div>
                                <i data-lucide="external-link" class="w-4 h-4 opacity-50"></i>
                            </button>
                        </div>

                        <div class="grid grid-cols-3 gap-3 mt-8 pt-8 border-t border-white/5">
                            <button onclick="shareTo('whatsapp')" class="flex flex-col items-center justify-center gap-2 p-4 bg-white/5 hover:bg-[#25D366]/20 border border-transparent hover:border-[#25D366]/50 rounded-2xl transition-all duration-300 group">
                                <i data-lucide="message-circle" class="w-6 h-6 text-slate-400 group-hover:text-[#25D366] transition-colors"></i>
                                <span class="text-[11px] md:text-xs font-bold text-slate-400 group-hover:text-white transition-colors">WhatsApp</span>
                            </button>
                            <button onclick="shareTo('twitter')" class="flex flex-col items-center justify-center gap-2 p-4 bg-white/5 hover:bg-[#1DA1F2]/20 border border-transparent hover:border-[#1DA1F2]/50 rounded-2xl transition-all duration-300 group">
                                <svg class="w-5 h-5 text-slate-400 group-hover:text-[#1DA1F2] transition-colors" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 22.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                                <span class="text-[11px] md:text-xs font-bold text-slate-400 group-hover:text-white transition-colors">Twitter / X</span>
                            </button>
                            <button onclick="copyCurrentLink()" class="flex flex-col items-center justify-center gap-2 p-4 bg-white/5 hover:bg-indigo-500/20 border border-transparent hover:border-indigo-500/50 rounded-2xl transition-all duration-300 group relative overflow-hidden">
                                <i data-lucide="copy" class="w-6 h-6 text-slate-400 group-hover:text-indigo-400 transition-colors"></i>
                                <span class="text-[11px] md:text-xs font-bold text-slate-400 group-hover:text-white transition-colors">Copy Link</span>
                            </button>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        window.mediaData = { videoNoWm: '', videoWm: '', audio: '', cover: '', originalUrl: '' };

        async function processLink() {
            const url = document.getElementById('url-input').value;
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            const btn = document.getElementById('main-btn');
            const result = document.getElementById('result-container');

            if (!url) {
                alert("Masukkan link TikTok terlebih dahulu!");
                return;
            }

            btn.disabled = true;
            btnText.innerText = "Memproses...";
            btnIcon.setAttribute('data-lucide', 'loader-2');
            btnIcon.classList.add('animate-spin');
            lucide.createIcons();
            result.classList.add('hidden');

            try {
                const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const json = await response.json();

                if (json.code === 0) {
                    const data = json.data;
                    
                    window.mediaData.videoNoWm = data.play;
                    window.mediaData.videoWm = data.wmplay;
                    window.mediaData.audio = data.music;
                    window.mediaData.cover = data.cover;
                    window.mediaData.originalUrl = url;

                    document.getElementById('res-video').src = data.play;
                    document.getElementById('res-avatar').src = data.author.avatar;
                    document.getElementById('res-author').innerText = `@${data.author.unique_id}`;
                    document.getElementById('res-title').innerText = data.title || "Tidak ada caption pada video ini.";

                    result.classList.remove('hidden');
                    setTimeout(() => {
                        window.scrollTo({ top: result.offsetTop - 40, behavior: 'smooth' });
                    }, 100);
                } else {
                    alert("Gagal memproses. Pastikan link video publik dan valid.");
                }
            } catch (err) {
                alert("Gagal terhubung ke server API.");
            } finally {
                btn.disabled = false;
                btnText.innerText = "Analisa Link";
                btnIcon.setAttribute('data-lucide', 'search');
                btnIcon.classList.remove('animate-spin');
                lucide.createIcons();
            }
        }

        function openLink(type) {
            const urlTarget = window.mediaData[type];
            if (urlTarget) window.open(urlTarget, '_blank', 'noopener,noreferrer');
        }

        function shareTo(platform) {
            if(!window.mediaData.originalUrl) return alert('Silakan analisa link dulu!');
            const url = encodeURIComponent(window.mediaData.originalUrl);
            const text = encodeURIComponent("Cek video keren ini dari TikTok! \n");
            
            if (platform === 'whatsapp') {
                window.open(`https://api.whatsapp.com/send?text=${text}${url}`, '_blank');
            } else if (platform === 'twitter') {
                window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
            }
        }

        function copyCurrentLink() {
            if (!window.mediaData.originalUrl) return alert('Silakan analisa link dulu!');
            navigator.clipboard.writeText(window.mediaData.originalUrl).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.remove('hidden', 'toast-exit');
                toast.classList.add('toast-enter');
                setTimeout(() => {
                    toast.classList.replace('toast-enter', 'toast-exit');
                    setTimeout(() => toast.classList.add('hidden'), 400);
                }, 2500);
            });
        }
    </script>
</body>
</html>
