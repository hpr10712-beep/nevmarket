<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>ELITE LAGA | ARENA LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: white; width: 1200px; margin: 0 auto; padding: 20px; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .neon-blue { border-bottom: 4px solid #3b82f6; box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.5); }
        .neon-red { border-bottom: 4px solid #ef4444; box-shadow: 0 10px 30px -10px rgba(239, 68, 68, 0.5); }
        .bot-notif { animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center mb-6 glass p-6 rounded-[2.5rem] border-t-2 border-yellow-500/30">
        <div class="flex items-center gap-5">
            <div class="h-14 w-14 bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-2xl flex items-center justify-center font-black text-black text-2xl font-orbitron shadow-lg">L</div>
            <div>
                <h2 id="playerID" class="font-orbitron text-xl font-black text-white italic uppercase">MEMUAT ID...</h2>
                <p class="text-[10px] text-green-500 font-bold tracking-[0.4em] animate-pulse">STATUS: LIVE CONNECTED</p>
            </div>
        </div>
        <div class="glass px-10 py-3 rounded-3xl border-r-4 border-yellow-500 text-right">
            <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">SALDO ANDA</p>
            <h2 id="balanceTxt" class="text-3xl font-orbitron font-black text-yellow-400 italic">Rp 0</h2>
        </div>
    </nav>

    <div class="grid grid-cols-3 gap-6">
        <div class="col-span-1 glass rounded-[2.5rem] p-6 h-[550px] flex flex-col border-l-4 border-blue-500">
            <h3 class="font-orbitron text-xs font-bold text-blue-400 mb-4 tracking-widest uppercase italic">Aktivitas Arena</h3>
            <div id="botLogs" class="space-y-3 overflow-hidden flex-1">
                </div>
        </div>

        <div class="col-span-2 space-y-6">
            <div class="grid grid-cols-2 gap-6">
                <div class="glass p-8 rounded-[3rem] text-center neon-blue">
                    <h3 class="text-xl font-orbitron font-black mb-4 text-blue-400 tracking-widest">SATRIA BIRU</h3>
                    <input type="number" id="amtA" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl mb-4 text-center text-xl font-orbitron font-bold text-white outline-none" placeholder="0.00">
                    <button onclick="placeBet('A')" class="w-full bg-blue-600 py-4 rounded-xl font-black font-orbitron hover:bg-blue-500 transition active:scale-95">PICK A</button>
                </div>
                <div class="glass p-8 rounded-[3rem] text-center neon-red">
                    <h3 class="text-xl font-orbitron font-black mb-4 text-red-400 tracking-widest">NAGA MERAH</h3>
                    <input type="number" id="amtB" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl mb-4 text-center text-xl font-orbitron font-bold text-white outline-none" placeholder="0.00">
                    <button onclick="placeBet('B')" class="w-full bg-red-600 py-4 rounded-xl font-black font-orbitron hover:bg-red-500 transition active:scale-95">PICK B</button>
                </div>
            </div>

            <div class="rounded-[2.5rem] overflow-hidden border border-white/5 relative h-64 shadow-2xl">
                <video autoplay muted loop class="w-full h-full object-cover opacity-40">
                    <source src="36577.mp4" type="video/mp4">
                </video>
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <div class="bg-red-600 px-4 py-1 rounded font-bold text-xs animate-pulse">LIVE</div>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCHr0eemIkfHNFDUkSaFDklp_c1OgmSnl8",
        databaseURL: "https://mybro-9ba5f-default-rtdb.firebaseio.com",
        projectId: "mybro-9ba5f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ID Unik
    let myID = localStorage.getItem('laga_player_id') || 'PLAYER-' + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('laga_player_id', myID);
    document.getElementById('playerID').innerText = myID;

    const myRef = ref(db, 'users/' + myID);
    let myBalance = 0;

    // Sinkronisasi Saldo
    onValue(myRef, (snap) => {
        if (!snap.exists()) { set(myRef, { balance: 0 }); }
        else {
            myBalance = snap.val().balance || 0;
            document.getElementById('balanceTxt').innerText = `Rp ${myBalance.toLocaleString('id-ID')}`;
        }
    });

    // Logika Menang/Kalah
    onValue(ref(db, 'match/result'), (snap) => {
        const winner = snap.val();
        if (!winner) return;

        const lastSide = localStorage.getItem('last_side');
        const lastAmt = parseInt(localStorage.getItem('last_amt') || 0);

        if (lastSide === winner && lastAmt > 0) {
            const winAmt = lastAmt * 2;
            update(myRef, { balance: myBalance + winAmt });
            Swal.fire({ title: 'MENANG! 🏆', text: `+ Rp ${winAmt.toLocaleString()}`, icon: 'success', background: '#020617', color: '#fbbf24' });
        } else if (lastSide && lastSide !== winner) {
            Swal.fire({ title: 'KALAH 💀', text: 'Coba lagi ronde berikutnya!', icon: 'error', background: '#020617', color: '#ef4444' });
        }
        localStorage.removeItem('last_side');
        localStorage.removeItem('last_amt');
    });

    // Fungsi Pasang Taruhan
    window.placeBet = (side) => {
        const amt = parseInt(document.getElementById('amt' + side).value);
        if (!amt || amt > myBalance) return Swal.fire('Gagal', 'Saldo tidak cukup!', 'error');
        
        localStorage.setItem('last_side', side);
        localStorage.setItem('last_amt', amt);
        update(myRef, { balance: myBalance - amt });
        document.getElementById('amt' + side).value = "";
        Swal.fire('Sukses', `Bet ${side} Terpasang!`, 'success');
    };

    // --- SISTEM ROBOT (Agar Ramai) ---
    const botNames = ["DewaLaga", "Sultan_88", "KeraSakti", "Player_Pro", "HokiTerus", "Master_Bet"];
    setInterval(() => {
        const name = botNames[Math.floor(Math.random() * botNames.length)];
        const side = Math.random() > 0.5 ? 'A' : 'B';
        const color = side === 'A' ? 'text-blue-400' : 'text-red-400';
        const nominal = (Math.floor(Math.random() * 10) + 1) * 50000;
        
        const log = document.getElementById('botLogs');
        const entry = document.createElement('div');
        entry.className = "glass p-3 rounded-xl text-[10px] bot-notif border-l-2 " + (side === 'A' ? 'border-blue-500' : 'border-red-500');
        entry.innerHTML = `<span class="text-slate-400">ID: ${name}</span><br><span class="font-bold ${color}">BET ${side}</span> - Rp ${nominal.toLocaleString()}`;
        
        log.prepend(entry);
        if(log.children.length > 7) log.lastChild.remove();
    }, 4000); // Muncul setiap 4 detik
</script>
</body>
</html>
