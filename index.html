<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>ELITE LAGA PRO | OFFICIAL ARENA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* Background Efek Agar Tidak Polos */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
            z-index: -1;
        }

        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        
        /* Robot Styling - Menggunakan filter cerah agar muncul */
        .robot-img { 
            height: 240px; width: auto; object-fit: contain; 
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.5));
        }
        .robot-red { filter: drop-shadow(0 0 30px rgba(239, 68, 68, 0.5)); }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        /* Video / TikTok Container */
        .video-wrapper {
            position: relative; width: 100%; border-radius: 30px; 
            overflow: hidden; border: 2px solid rgba(255,255,255,0.1);
            background: #000; height: 500px;
        }

        /* Scanning Animation */
        .scan-overlay {
            position: absolute; inset: 0; z-index: 10;
            background: #020617; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            animation: fadeOut 2.5s forwards 1.5s;
        }
        .line { width: 100%; height: 3px; background: #fbbf24; position: absolute; animation: scan 2s infinite; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
    </style>
</head>
<body class="flex justify-center">

<div class="w-full max-w-[1000px]">
    <nav class="glass p-5 rounded-[2.5rem] flex justify-between items-center mb-6 border-t-2 border-yellow-500/50 shadow-yellow-500/10 shadow-2xl">
        <div class="flex items-center gap-4">
            <div class="h-12 w-12 bg-yellow-500 rounded-2xl flex items-center justify-center text-black font-black text-2xl font-orbitron shadow-lg">E</div>
            <div>
                <h2 id="playerID" class="font-orbitron text-base font-bold tracking-widest text-white uppercase">PLAYER-LOADING</h2>
                <p class="text-[8px] text-green-400 font-bold tracking-[0.4em] animate-pulse uppercase">Arena Live Connection</p>
            </div>
        </div>
        <div class="text-right px-4 border-l border-white/10">
            <p class="text-[8px] text-slate-500 font-bold uppercase mb-1">Total Credits</p>
            <h2 id="balanceTxt" class="text-xl font-orbitron font-black text-yellow-400">Rp 0</h2>
        </div>
    </nav>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div class="glass p-8 rounded-[3.5rem] text-center border-b-8 border-blue-600 relative overflow-hidden group">
            <div class="absolute -top-10 -left-10 w-32 h-32 bg-blue-600/10 rounded-full blur-3xl"></div>
            <img src="https://pngimg.com/d/robot_PNG93.png" class="robot-img mx-auto mb-4" alt="Shotgun Bot">
            <h3 class="text-lg font-orbitron font-black text-blue-400 mb-4 tracking-tighter uppercase italic">Striker Shotgun</h3>
            <input type="number" id="amtA" class="w-full bg-slate-900/80 border border-slate-700 p-4 rounded-2xl mb-4 text-center text-xl font-bold text-white focus:border-blue-500 transition-all outline-none" placeholder="0">
            <button onclick="placeBet('A')" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-orbitron font-black text-white shadow-lg active:scale-95 transition-all">PICK UNIT A</button>
        </div>

        <div class="glass p-8 rounded-[3.5rem] text-center border-b-8 border-red-600 relative overflow-hidden group">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-red-600/10 rounded-full blur-3xl"></div>
            <img src="https://pngimg.com/d/robot_PNG18.png" class="robot-img robot-red mx-auto mb-4" alt="Sniper Bot">
            <h3 class="text-lg font-orbitron font-black text-red-400 mb-4 tracking-tighter uppercase italic">Hunter Sniper</h3>
            <input type="number" id="amtB" class="w-full bg-slate-900/80 border border-slate-700 p-4 rounded-2xl mb-4 text-center text-xl font-bold text-white focus:border-red-500 transition-all outline-none" placeholder="0">
            <button onclick="placeBet('B')" class="w-full bg-red-600 hover:bg-red-500 py-4 rounded-2xl font-orbitron font-black text-white shadow-lg active:scale-95 transition-all">PICK UNIT B</button>
        </div>
    </div>

    <div class="video-wrapper shadow-2xl mb-10">
        <div class="scan-overlay">
            <div class="line"></div>
            <h1 class="font-orbitron text-2xl text-yellow-500 italic font-black animate-pulse uppercase tracking-[0.3em]">Link Arena Sedang Dimuat</h1>
        </div>
        <iframe src="https://www.tiktok.com/player/v1/7488059737937186064?autoplay=1" class="w-full h-full" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCHr0eemIkfHNFDUkSaFDklp_c1OgmSnl8",
        databaseURL: "https://mybro-9ba5f-default-rtdb.firebaseio.com",
        projectId: "mybro-9ba5f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myID = localStorage.getItem('laga_player_id') || 'PLR-' + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('laga_player_id', myID);
    document.getElementById('playerID').innerText = myID;

    const myRef = ref(db, 'users/' + myID);
    let myBalance = 0;

    onValue(myRef, (snap) => {
        if (!snap.exists()) { set(myRef, { balance: 0 }); }
        else {
            myBalance = snap.val().balance || 0;
            document.getElementById('balanceTxt').innerText = `Rp ${myBalance.toLocaleString('id-ID')}`;
        }
    });

    onValue(ref(db, 'match/result'), (snap) => {
        const winner = snap.val();
        if (!winner) return;
        const side = localStorage.getItem('last_side');
        const amt = parseInt(localStorage.getItem('last_amt') || 0);

        if (side === winner && amt > 0) {
            update(myRef, { balance: myBalance + (amt * 2) });
            Swal.fire({ title: 'WINNER! 🏆', text: 'Saldo Berhasil Update!', icon: 'success', background: '#020617', color: '#fbbf24' });
        } else if (side) {
            Swal.fire({ title: 'DEFEAT', text: 'Unit Hancur!', icon: 'error', background: '#020617', color: '#ef4444' });
        }
        localStorage.removeItem('last_side');
        localStorage.removeItem('last_amt');
    });

    window.placeBet = (side) => {
        const amt = parseInt(document.getElementById('amt' + side).value);
        if (!amt || amt > myBalance) return Swal.fire('Error', 'Kredit tidak cukup!', 'error');
        localStorage.setItem('last_side', side);
        localStorage.setItem('last_amt', amt);
        update(myRef, { balance: myBalance - amt });
        document.getElementById('amt' + side).value = "";
        Swal.fire('BERHASIL', `Unit ${side} Terpasang!`, 'success');
    };
</script>

</body>
</html>
