<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-value=1"> 
    <title>ELITE ARENA | OFFICIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; 
            margin: 0 auto; width: 1200px; padding: 20px 0;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(239, 68, 68, 0.1) 0%, transparent 40%),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            background-attachment: fixed;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s; }
        
        /* Profile & Status */
        .profile-box {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 1) 100%);
            border: 1px solid rgba(251, 191, 36, 0.3); border-radius: 30px; padding: 15px 30px; display: flex; align-items: center; gap: 20px;
        }
        .avatar-circle { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #fbbf24; overflow: hidden; background: #000; }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }

        .status-banner {
            display: flex; align-items: center; justify-content: center; gap: 15px;
            padding: 12px 40px; border-radius: 50px; font-family: 'Orbitron', sans-serif;
            font-weight: 900; font-size: 16px; letter-spacing: 2px; text-transform: uppercase;
        }
        .status-open { background: rgba(16, 185, 129, 0.1); border: 2px solid #10b981; color: #34d399; box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        .status-closed { background: rgba(239, 68, 68, 0.1); border: 2px solid #ef4444; color: #f87171; }

        /* Unit Cards */
        .unit-card { position: relative; overflow: hidden; border-radius: 3rem; padding: 40px; text-align: center; border-top: 6px solid transparent; }
        .card-a { border-color: #2563eb; box-shadow: 0 10px 40px -10px rgba(37, 99, 235, 0.3); }
        .card-b { border-color: #dc2626; box-shadow: 0 10px 40px -10px rgba(220, 38, 38, 0.3); }
        
        .char-circle { width: 180px; height: 180px; border-radius: 50%; margin: 0 auto 20px; border: 4px solid rgba(255,255,255,0.1); overflow: hidden; }
        .char-circle img { width: 100%; height: 100%; object-fit: cover; }
        
        .locked { opacity: 0.2; filter: grayscale(1); pointer-events: none; }

        .rgb-frame { border-radius: 40px; padding: 4px; background: linear-gradient(var(--angle), #fbbf24, #ef4444, #3b82f6, #fbbf24); --angle: 0deg; animation: rotateBorder 4s linear infinite; }
        @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
        @keyframes rotateBorder { to { --angle: 360deg; } }
 
    /* Animasi Iklan Teks */
@keyframes fadeSlide {
    0% { opacity: 0; transform: translateY(20px) scale(0.9); filter: blur(10px); }
    15% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    85% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    100% { opacity: 0; transform: translateY(-20px) scale(1.1); filter: blur(10px); }
}

.animate-fade-slide {
    animation: fadeSlide 1.5s infinite ease-in-out;
}

    
    </style>
</head>
<body>

    <div class="flex justify-between items-center px-10 mb-10">
        <div class="profile-box shadow-2xl">
            <div class="avatar-circle">
                <img src="https://i.ibb.co.com/pqyBmFQ/eedd9bb8-f4d4-488b-86a1-3ff00eb9c3c9.jpg" alt="Profile">
            </div>
            <div>
                <h1 id="playerID" class="font-orbitron text-xl font-black text-white tracking-widest uppercase italic">...</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span class="h-2 w-2 bg-green-500 rounded-full animate-ping"></span>
                    <span class="text-[10px] font-bold text-green-400 uppercase tracking-widest">System Online</span>
                </div>
            </div>
        </div>

        <div id="pickBanner" class="status-banner status-open">
            <span id="pickText">PICK TELAH DIBUKA</span>
        </div>

        <div class="glass px-10 py-5 rounded-3xl border-r-8 border-yellow-500 bg-slate-900/80 shadow-xl">
            <p class="text-[9px] text-yellow-500 font-bold uppercase tracking-[0.3em] mb-1">Current Credits</p>
            <h2 id="balanceTxt" class="text-3xl font-orbitron font-black text-white italic">Rp 0</h2>
        </div>
    </div>

    <div class="px-10 grid grid-cols-12 gap-10">
        <div id="cardA" class="col-span-6 glass unit-card card-a">
            <div class="char-circle shadow-2xl"><img src="https://i.ibb.co.com/gFL17MRg/2f0745fb-c6db-4785-b34a-9d02256e9522.jpg" alt="Unit A"></div>
            <h3 class="font-orbitron text-2xl font-black text-blue-400 mb-6 tracking-tighter uppercase italic">RADZ [GRANT 77]</h3>
            <input type="number" id="amtA" class="w-full bg-slate-950/80 border border-slate-700 p-5 rounded-2xl mb-5 text-center text-2xl font-orbitron font-bold text-white focus:border-blue-500 outline-none transition-all" placeholder="0">
            <button onclick="placeBet('A')" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-orbitron font-black text-lg shadow-lg active:scale-95 transition-all">DEPLOY STRIKER</button>
        </div>

        <div id="cardB" class="col-span-6 glass unit-card card-b">
            <div class="char-circle shadow-2xl"><img src="https://i.ibb.co.com/49Yp0kf/Elite-pass-Mordern-Ninjas-S20-1-3.jpg" alt="Unit B"></div>
            <h3 class="font-orbitron text-2xl font-black text-red-400 mb-6 tracking-tighter uppercase italic">JILY [MARGA 55]</h3>
            <input type="number" id="amtB" class="w-full bg-slate-950/80 border border-slate-700 p-5 rounded-2xl mb-5 text-center text-2xl font-orbitron font-bold text-white focus:border-red-500 outline-none transition-all" placeholder="0">
            <button onclick="placeBet('B')" class="w-full bg-red-600 hover:bg-red-500 py-5 rounded-2xl font-orbitron font-black text-lg shadow-lg active:scale-95 transition-all">DEPLOY HUNTER</button>
        </div>

        <div class="col-span-12 mt-5 mb-20">
    <div class="rgb-frame shadow-2xl">
        <div class="bg-slate-950 rounded-[36px] overflow-hidden aspect-[21/6] flex items-center justify-center relative border-4 border-slate-900">
            <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(#3b82f6 1px, transparent 1px); background-size: 20px 20px;"></div>
            
            <div class="text-center z-10 px-10">
                <div id="ad-text" class="font-orbitron text-3xl font-black italic tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-white to-blue-500 drop-shadow-[0_0_15px_rgba(255,255,255,0.5)] animate-fade-slide">
                    CARA PICK?
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, push, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCHr0eemIkfHNFDUkSaFDklp_c1OgmSnl8",
        databaseURL: "https://mybro-9ba5f-default-rtdb.firebaseio.com",
        projectId: "mybro-9ba5f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- IDENTITY ---
    let myID = localStorage.getItem('laga_player_id');
    if (!myID) {
        myID = 'ELITE-' + Math.floor(1000 + Math.random() * 8999);
        localStorage.setItem('laga_player_id', myID);
    }
    document.getElementById('playerID').innerText = myID;

    let myBalance = 0;
    let isPickOpen = true;
    const myRef = ref(db, 'users/' + myID);

    // --- TIME UTILITY ---
    const getFullTime = () => {
        const d = new Date();
        const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        return `${days[d.getDay()]}, ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()} - ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`;
    };

    // --- SYNC SALDO ---
    onValue(myRef, (snap) => {
        if (!snap.exists()) { set(myRef, { balance: 100000 }); } // Saldo awal free
        else {
            myBalance = snap.val().balance || 0;
            document.getElementById('balanceTxt').innerText = `Rp ${myBalance.toLocaleString('id-ID')}`;
        }
    });

    // --- SYNC GATE STATUS ---
    onValue(ref(db, 'match/status'), (snap) => {
        const status = snap.val() || 'open';
        isPickOpen = (status === 'open');
        const banner = document.getElementById('pickBanner');
        banner.className = isPickOpen ? "status-banner status-open" : "status-banner status-closed";
        document.getElementById('pickText').innerText = isPickOpen ? "PICK TELAH DIBUKA" : "PICK TELAH DITUTUP";
        document.getElementById('cardA').className = isPickOpen ? "col-span-6 glass unit-card card-a" : "col-span-6 glass unit-card card-a locked";
        document.getElementById('cardB').className = isPickOpen ? "col-span-6 glass unit-card card-b" : "col-span-6 glass unit-card card-b locked";
    });

    // --- ACTION: PLACE BET ---
// --- ACTION: PLACE BET ---
window.placeBet = async (side) => {
    if (!isPickOpen) return Swal.fire('Locked', 'Bursa sudah ditutup!', 'warning');
    
    const amtInput = document.getElementById('amt' + side);
    const amt = parseInt(amtInput.value);

    if (!amt || amt <= 0) return Swal.fire('Info', 'Masukkan nominal!', 'info');
    if (amt > myBalance) return Swal.fire('Error', 'Saldo tidak cukup!', 'error');

    // --- BAGIAN YANG DIUPDATE ---
    await update(myRef, { 
        balance: myBalance - amt,
        side: side,          // <--- TAMBAHKAN INI (Agar Admin bisa baca Unit mana)
        betAmount: amt       // <--- TAMBAHKAN INI (Agar Admin bisa hitung Market Volume)
    });
    // ----------------------------

    localStorage.setItem('last_side', side);
    localStorage.setItem('last_amt', amt);

    // Kirim Log ke Admin
    push(ref(db, 'globalLogs'), {
        time: getFullTime(),
        user: myID,
        desc: `PICK UNIT ${side}`,
        amount: amt,
        type: 'process'
    });

    amtInput.value = "";
    Swal.fire({ icon: 'success', title: 'DEPLOYED', text: `Unit ${side} telah dikirim ke arena!`, background: '#020617', color: '#fff' });
};


    // --- ACTION: RESULT LISTENER ---
    onValue(ref(db, 'match/result'), (snap) => {
        const winner = snap.val();
        if (!winner) return;

        const side = localStorage.getItem('last_side');
        const amt = parseInt(localStorage.getItem('last_amt') || 0);

        if (side === winner && amt > 0) {
            const winPrize = amt * 2;
            update(myRef, { balance: myBalance + winPrize });
            
            // Log Menang ke Admin
            push(ref(db, 'globalLogs'), {
                time: getFullTime(),
                user: myID,
                desc: `WINNER UNIT ${side}`,
                amount: winPrize,
                type: 'win'
            });

            Swal.fire({ title: 'VICTORY! 🏆', text: 'Unit Anda memenangkan pertempuran!', icon: 'success', background: '#020617', color: '#fff' });
        } else if (side && side !== winner) {
            // Log Kalah ke Admin
            push(ref(db, 'globalLogs'), {
                time: getFullTime(),
                user: myID,
                desc: `LOSE UNIT ${side}`,
                amount: amt,
                type: 'lose'
            });

            Swal.fire({ title: 'DEFEAT', text: 'Unit Anda hancur di medan perang!', icon: 'error', background: '#020617', color: '#fff' });
        }

        // Reset Data
        localStorage.removeItem('last_side');
        localStorage.removeItem('last_amt');
    });

        // --- LOGIKA IKLAN TEXT CHANGER ---
    const adTexts = [
        "CARA PICK?",
        "PILIH SALAH SATU PEMAIN ANDALAN ANDA",
        "MASUKAN JUMLAH YANG AKAN DIPASANG",
        "TUNGGU GAME SELESAI!",
        "JANGAN SPAM PASANG!"
    ];
    
    let adIndex = 0;
    const adElement = document.getElementById('ad-text');

    // Berjalan setiap 1.5 detik sinkron dengan animasi CSS
    setInterval(() => {
        adIndex = (adIndex + 1) % adTexts.length;
        adElement.innerText = adTexts[adIndex];
    }, 1500);


</script>
</body>
</html>
