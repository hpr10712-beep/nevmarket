<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radz Store Elite</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

body{
  margin:0;
  font-family:'Orbitron',monospace;
  background:#000;
  color:#fff;
}

/* BACKGROUND */
#bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
  opacity:0.2;
}
#bg video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CONTAINER */
.container{
  width:100%;
  max-width:500px; /* biar tetap center tapi gak ganggu background */
  margin:auto;
  padding:40px 16px;
}

/* TITLE */
h1{
  text-align:center;
  font-size:36px;
  background:linear-gradient(90deg,#ff6b6b,#4ecdc4);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  padding:18px;
  border-radius:15px;
  margin-top:15px;
  box-shadow:0 0 20px rgba(255,107,107,0.3);
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff6b6b,#4ecdc4);
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
button:hover{transform:scale(1.05);}

/* PROFILE */
.profile{
  display:flex;
  align-items:center;
  gap:10px;
}
.profile img{
  width:55px;
  height:55px;
  border-radius:50%;
  border:2px solid #ff6b6b;
}

/* BANNER FIX */
.banner img{
  width:100%;
  border-radius:12px;
  margin-top:10px;
}

/* ACTION */
.action{
  display:flex;
  gap:10px;
  margin-top:15px;
}
.action button{flex:1;}

/* POPUP */
.popup{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  border-radius:10px;
  font-weight:bold;
  display:none;
  z-index:999;
}
.success{background:#00c853;}
.error{background:#d50000;}

.hidden{display:none;}

  .btn-group{
  display:flex;
  gap:15px;
  margin-top:20px;
}

.btn-glow{
  flex:1;
  position:relative;
  padding:16px;
  border:none;
  border-radius:14px;
  font-weight:600;
  font-size:14px;
  color:#000;
  cursor:pointer;
  overflow:hidden;
  transition:all .3s ease;
  z-index:1;
}

/* GRADIENT */
.btn-glow.save{
  background:linear-gradient(135deg,#ff6b6b,#ff9f43);
}
.btn-glow.wa{
  background:linear-gradient(135deg,#4ecdc4,#1dd1a1);
}

/* GLOW EFFECT */
.btn-glow::before{
  content:'';
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.5),
    transparent
  );
  transform:rotate(25deg);
  opacity:0;
  transition:0.5s;
}

.btn-glow:hover::before{
  animation:shine 1s linear;
  opacity:1;
}

@keyframes shine{
  0%{transform:translateX(-100%) rotate(25deg);}
  100%{transform:translateX(100%) rotate(25deg);}
}

/* HOVER */
.btn-glow:hover{
  transform:translateY(-4px) scale(1.03);
  box-shadow:0 0 20px rgba(255,255,255,0.2);
}

/* CLICK */
.btn-glow:active{
  transform:scale(0.96);
}

/* SOFT PULSE */
.btn-glow.save{
  background: linear-gradient(135deg, #ff6b6b, #ff8e53);
}

.btn-glow.wa{
  background: linear-gradient(135deg, #00c9ff, #92fe9d);
}
.btn-glow span{
  font-weight: 900;
  letter-spacing: 2px;
}
.btn-glow{
  backdrop-filter: blur(10px);
  box-shadow:
    0 8px 25px rgba(0,0,0,0.5),
    inset 0 0 10px rgba(255,255,255,0.05);
}
  /* KHUSUS CARD GAMBAR */
.image-card {
  padding: 0; /* HILANGKAN padding biar gak ada hitam */
  overflow: hidden;
  border-radius: 20px;
}

/* GAMBAR FULL */
.image-card img {
  width: 100%;
  height: 100px; /* bisa kamu ubah */
  object-fit: cover; /* biar nutup penuh */
  display: block;
  border-radius: 20px;
  }
  .image-card img {
  transition: 0.5s;
}

.image-card:hover img {
  transform: scale(1.05);
  filter: brightness(1.1);
}
  /* OVERLAY KOTAK ABU */
.image-card {
  position: relative;
  padding: 0;
  overflow: hidden;
  border-radius: 20px;
}

/* layer kotak-kotak */
.image-card::after {
  content: "";
  position: absolute;
  inset: 0;

  background-image: 
    linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);

  background-size: 10px 10px; /* ukuran kotak */
  pointer-events: none;
}
  .image-card::after {
  animation: gridMove 10s linear infinite;
}

@keyframes gridMove {
  0% { background-position: 0 0, 0 0; }
  100% { background-position: 100px 100px, 100px 100px; }
}
.menu-panel{
margin-top:25px;
display:flex;
flex-direction:column;
gap:12px;
}

/* CARD MENU */
.shop-card{

background:linear-gradient(135deg,#ff6a6a,#ffb36b);
padding:16px;
border-radius:14px;

box-shadow:
0 5px 15px rgba(0,0,0,0.5),
0 0 10px rgba(255,0,0,0.3);

cursor:pointer;
transition:0.25s;
}

/* HOVER */
.shop-card:hover{
transform:scale(1.03);
}

/* JUDUL */
.shop-card .title{
font-size:16px;
font-weight:700;
color:white;
}

/* HARGA */
.shop-card .price{
font-size:13px;
opacity:0.9;
margin-top:3px;
}
</style>
</head>
