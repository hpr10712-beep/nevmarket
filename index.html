<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-value=1"> 
    <title>FREE FIRE | ELITE WARZONE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #000; color: #fff; font-family: 'Inter', sans-serif; 
            margin: 0 auto; width: 1200px; padding: 30px 0;
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.85), rgba(0,0,0,0.98)), url('https://wallpaperaccess.com/full/2043324.jpg');
            background-size: cover; background-attachment: fixed; background-position: center;
            overflow-x: hidden;
        }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .font-bebas { font-family: 'Bebas Neue', cursive; }

        /* HEADER & PROFILE STYLING */
        .profile-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 12px 24px 12px 12px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .profile-circle {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 3px solid #fbbf24;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.2); /* Glow dikurangi */
        }
        .profile-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Saldo Diamond Styling */
        .saldo-card {
            background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
            border: 2px solid rgba(251, 191, 36, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-right: 6px solid #fbbf24;
        }

        /* KARAKTER & ARENA */
        .glass { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .char-frame { height: 380px; display: flex; align-items: flex-end; justify-content: center; position: relative; }
        .ff-char { 
            height: 360px; object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(59, 130, 246, 0.3)); /* Glow dikurangi */
            animation: idleBreath 4s ease-in-out infinite;
        }
        .ff-char-red { filter: drop-shadow(0 0 15px rgba(239, 68, 68, 0.3)); }

        @keyframes idleBreath {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Video Frame */
        .rgb-frame {
            position: relative; border-radius: 40px; padding: 6px;
            background: linear-gradient(var(--angle), #fbbf24, #ef4444, #3b82f6, #fbbf24);
            --angle: 0deg; animation: rotateBorder 4s linear infinite;
        }
        @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
        @keyframes rotateBorder { to { --angle: 360deg; } }
        .video-box { background: #000; border-radius: 35px; overflow: hidden; height: 550px; width: 100%; }
    </style>
</head>
<body>

    <div class="flex justify-between items-center px-10 mb-12">
        <div class="profile-container shadow-2xl">
            <div class="profile-circle">
                <img src="https://i.ibb.co.com/pqyBmFQ/eedd9bb8-f4d4-488b-86a1-3ff00eb9c3c9.jpg" alt="FF Logo">
            </div>
            <div>
                <h1 id="playerID" class="font-bebas text-4xl tracking-widest text-white italic leading-none">PLAYER_LOADING</h1>
                <div class="flex items-center gap-2 mt-1">
                    <div class="bg-green-500/20 px-2 py-0.5 rounded border border-green-500/50 flex items-center gap-1.5">
                        <span class="h-1.5 w-1.5 bg-green-500 rounded-full animate-pulse"></span>
                        <p class="text-[10px] font-orbitron font-bold text-green-400 uppercase tracking-widest">BATTLE ONLINE</p>
                    </div>
                </div>
                <p class="text-[9px] text-white/40 font-bold mt-1 tracking-[0.2em] uppercase">UID: 982734102</p>
            </div>
        </div>

        <div class="saldo-card px-10 py-5 rounded-2xl min-w-[350px]">
            <p class="text-xs text-yellow-500 font-bold uppercase tracking-widest mb-1">Diamond Account</p>
            <h2 id="balanceTxt" class="text-4xl font-orbitron font-black text-white italic">Rp 0</h2>
        </div>
    </div>

    <div class="px-10 grid grid-cols-12 gap-10">
        <div class="col-span-6 glass p-10 rounded-[3.5rem] text-center border-t-[8px] border-blue-600 relative overflow-hidden">
            <div class="char-frame">
                <img src="https://i.ibb.co.com/5hx6y4fN/a3b9d2cd-6c9b-4690-8598-35679ae9cb10.jpg" class="ff-char" alt="Unit A">
            </div>
            <h3 class="font-bebas text-4xl text-blue-400 mb-6 tracking-widest">RADZ GT (Striker)</h3>
            <input type="number" id="amtA" class="w-full bg-black/60 border border-white/10 p-6 rounded-2xl mb-6 text-center text-3xl font-orbitron font-bold text-white outline-none focus:border-blue-500" placeholder="0">
            <button onclick="placeBet('A')" class="w-full bg-blue-600 hover:bg-blue-500 py-6 rounded-2xl font-bebas text-3xl text-white uppercase tracking-widest transition-all">DEPLOY UNIT A</button>
        </div>

        <div class="col-span-6 glass p-10 rounded-[3.5rem] text-center border-t-[8px] border-red-600 relative overflow-hidden">
            <div class="char-frame">
                <img src="https://i.ibb.co.com/PJRGbMp/771bd209-5182-45b9-8d06-db7a4698d2ba.jpg" class="ff-char ff-char-red" alt="Unit B">
            </div>
            <h3 class="font-bebas text-4xl text-red-400 mb-6 tracking-widest">ALYA VM (Hunter)</h3>
            <input type="number" id="amtB" class="w-full bg-black/60 border border-white/10 p-6 rounded-2xl mb-6 text-center text-3xl font-orbitron font-bold text-white outline-none focus:border-red-500" placeholder="0">
            <button onclick="placeBet('B')" class="w-full bg-red-600 hover:bg-red-500 py-6 rounded-2xl font-bebas text-3xl text-white uppercase tracking-widest transition-all">DEPLOY UNIT B</button>
        </div>

        <div class="col-span-12 mt-4 mb-10">
            <div class="rgb-frame shadow-2xl">
                <div class="video-box relative">
                    <iframe src="https://www.tiktok.com/player/v1/7488059737937186064?autoplay=1" class="w-full h-full" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCHr0eemIkfHNFDUkSaFDklp_c1OgmSnl8",
        databaseURL: "https://mybro-9ba5f-default-rtdb.firebaseio.com",
        projectId: "mybro-9ba5f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myID = localStorage.getItem('laga_player_id') || 'USER-' + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('laga_player_id', myID);
    document.getElementById('playerID').innerText = myID;

    const myRef = ref(db, 'users/' + myID);
    let myBalance = 0;

    onValue(myRef, (snap) => {
        if (!snap.exists()) { set(myRef, { balance: 0 }); }
        else {
            myBalance = snap.val().balance || 0;
            document.getElementById('balanceTxt').innerText = `Rp ${myBalance.toLocaleString('id-ID')}`;
        }
    });

    onValue(ref(db, 'match/result'), (snap) => {
        const winner = snap.val();
        if (!winner) return;
        const side = localStorage.getItem('last_side');
        const amt = parseInt(localStorage.getItem('last_amt') || 0);

        if (side === winner && amt > 0) {
            update(myRef, { balance: myBalance + (amt * 2) });
            Swal.fire({ title: 'BOOYAH! 🏆', text: 'Kemenangan Mutlak!', icon: 'success', background: '#0f172a', color: '#fff' });
        } else if (side) {
            Swal.fire({ title: 'ELIMINATED', text: 'Kembali ke Lobby!', icon: 'error', background: '#1e1b4b', color: '#fff' });
        }
        localStorage.removeItem('last_side');
        localStorage.removeItem('last_amt');
    });

    window.placeBet = (side) => {
        const amt = parseInt(document.getElementById('amt' + side).value);
        if (!amt || amt > myBalance) return Swal.fire('Error', 'Saldo tidak cukup!', 'error');
        localStorage.setItem('last_side', side);
        localStorage.setItem('last_amt', amt);
        update(myRef, { balance: myBalance - amt });
        document.getElementById('amt' + side).value = "";
        Swal.fire('BERHASIL', `Unit ${side} Terjun Ke Map!`, 'success');
    };
</script>

</body>
</html>
