<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MyBro - Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0b1120;
            --panel: #1e293b;
            --panel-hover: #334155;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.2);
            --blue-tick: #3b82f6;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --safe-top: env(safe-area-inset-top);
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        header { 
            padding: calc(15px + var(--safe-top)) 20px 15px; 
            background: rgba(11, 17, 32, 0.9); backdrop-filter: blur(15px); 
            border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .logo { font-size: 1.4rem; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
        .logo span { color: var(--accent); }
        .my-id-tag { background: var(--panel); padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); }

        /* CONTENT VIEWS */
        .content { flex: 1; overflow-y: auto; padding: 15px 15px 90px; scroll-behavior: smooth; }
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        h4 { font-size: 0.95rem; font-weight: 600; color: var(--text-dim); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* CARDS */
        .card { 
            background: transparent; border-radius: 12px; padding: 12px; margin-bottom: 5px; 
            display: flex; align-items: center; gap: 15px; transition: 0.2s; cursor: pointer; position: relative;
        }
        .card:hover, .card:active { background: var(--panel); }
        
        .pfp-wrap { position: relative; width: 52px; height: 52px; border-radius: 50%; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .pfp-wrap.has-story { background: linear-gradient(45deg, var(--accent), #3b82f6); padding: 2.5px; }
        .pfp-wrap.has-story img { border: 2px solid var(--bg); }
        .pfp { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: var(--panel); }

        .card-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
        .card-header-flex { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
        .card-name { font-weight: 600; font-size: 1rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-time { font-size: 0.75rem; color: var(--text-dim); flex-shrink: 0; }
        .card-msg { font-size: 0.85rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 5px; }
        
        /* UNREAD BADGE */
        .unread-badge { background: var(--accent); color: white; font-size: 0.7rem; font-weight: 700; padding: 2px 6px; border-radius: 10px; min-width: 20px; text-align: center; }

        /* MODALS & OVERLAYS */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: none; z-index: 4000; align-items: flex-end; }
        .overlay.active { display: flex; }
        .sheet { background: var(--bg); width: 100%; border-radius: 20px 20px 0 0; padding: 25px 20px 40px; transform: translateY(100%); transition: 0.3s ease; border-top: 1px solid var(--border); }
        .overlay.active .sheet { transform: translateY(0); }
        .menu-item { padding: 16px 20px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; font-size: 1rem; color: var(--text); border-bottom: 1px solid var(--border); }
        .menu-item.text-danger { color: #ef4444; }

        /* CHAT PANEL */
        #chatPanel { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; transform: translateX(100%); transition: 0.3s ease; }
        #chatPanel.active { transform: translateX(0); }
        .chat-header { padding: calc(10px + var(--safe-top)) 15px 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; background: rgba(11, 17, 32, 0.95); backdrop-filter: blur(10px); }
        
        #msgArea { flex: 1; padding: 20px 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .bubble { padding: 10px 14px; border-radius: 16px; max-width: 80%; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; position: relative; }
        .sent { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        
        /* NAV BOTTOM */
        nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: rgba(11, 17, 32, 0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--border); display: flex; z-index: 500; }
        .nav-link { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; color: var(--text-dim); font-size: 0.7rem; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .nav-link.active { color: var(--accent); }

        .toast-msg { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--accent); color: white; padding: 10px 20px; border-radius: 50px; font-size: 0.85rem; z-index: 9999; opacity: 0; transition: 0.3s; pointer-events: none; }
        .toast-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <header>
        <div class="logo">My<span>Bro</span></div>
        <div class="my-id-tag" id="displayID" onclick="copyID()">ID: ...</div>
    </header>

    <div class="content">
        <div id="v-chats" class="view active">
            <div id="archivedBtn" style="display:none; padding:12px 15px; margin-bottom:10px; background:var(--panel); border-radius:12px; cursor:pointer; align-items:center; gap:15px;" onclick="toggleArchived()">
                <i class="fas fa-archive"></i>
                <div style="flex:1; font-weight:600;">Diarsipkan</div>
                <div id="archivedCount" style="color:var(--accent);">0</div>
            </div>
            <div id="archivedList" style="display:none; margin-bottom: 20px;"></div>
            <div id="chatList"></div>
        </div>

        <div id="v-status" class="view">
            <h4>Status Saya</h4>
            <div class="card" onclick="window.app.openMyStory()">
                <div class="pfp-wrap" id="myStatusPfpWrap"><img id="myStatusPfp" src="" class="pfp"></div>
                <div class="card-info">
                    <div class="card-name">Status Saya</div>
                    <div id="myStatusText" class="card-msg">Ketuk untuk menambah status</div>
                </div>
            </div>
            <input type="file" id="storyUpload" style="display:none" onchange="window.app.uploadStory(this)">
            <h4 style="margin-top:20px;">Pembaruan Teman</h4>
            <div id="storyList"></div>
        </div>

        <div id="v-contacts" class="view">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h4 style="margin:0">Daftar Teman</h4>
                <button onclick="toggleOverlay('popAdd', true)" style="background:var(--accent); border:none; color:white; padding:6px 12px; border-radius:8px;"><i class="fas fa-plus"></i> Tambah</button>
            </div>
            <div id="contactList"></div>
        </div>

        <div id="v-profile" class="view">
            <div class="profile-header" onclick="toggleOverlay('popProfile', true)" style="display:flex; align-items:center; gap:15px; padding: 20px; background: var(--panel); border-radius:12px; cursor:pointer;">
                <img id="vProfilePfp" src="" class="pfp" style="width:60px; height:60px;">
                <div style="flex:1;">
                    <h3 id="vProfileName">Nama</h3>
                    <div id="vProfileBio" style="color:var(--text-dim); font-size:0.8rem;">Bio...</div>
                </div>
                <i class="fas fa-chevron-right"></i>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-link active" onclick="showTab('v-chats', this)"><i class="fas fa-comment-dots"></i><span>Chat</span></div>
        <div class="nav-link" onclick="showTab('v-status', this)"><i class="fas fa-circle-notch"></i><span>Status</span></div>
        <div class="nav-link" onclick="showTab('v-contacts', this)"><i class="fas fa-users"></i><span>Teman</span></div>
        <div class="nav-link" onclick="showTab('v-profile', this)"><i class="fas fa-cog"></i><span>Setelan</span></div>
    </nav>

    <div id="chatPanel">
        <div class="chat-header">
            <i class="fas fa-arrow-left" onclick="window.app.closeChat()" style="cursor:pointer;"></i>
            <img id="chatPfp" src="" class="pfp" style="width:40px; height:40px;">
            <div style="flex:1">
                <div id="chatName" style="font-weight:600;">...</div>
                <div style="font-size:0.7rem; color:var(--accent);">Online</div>
            </div>
            <i class="fas fa-ellipsis-v" onclick="toggleOverlay('chatMenu', true)"></i>
        </div>
        <div id="msgArea"></div>
        <div style="padding:15px; display:flex; gap:10px; background:var(--bg);">
            <input type="text" id="msgIn" placeholder="Ketik pesan..." style="flex:1; padding:12px; border-radius:10px; background:var(--panel); border:1px solid var(--border); color:white; outline:none;" onkeypress="if(event.key==='Enter') window.app.send()">
            <button onclick="window.app.send()" style="background:var(--accent); border:none; width:45px; height:45px; border-radius:10px; color:white;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="overlay" id="popAdd" onclick="closeOverlay(event)"><div class="sheet"><h3>Tambah Teman</h3><input type="text" id="targetID" placeholder="Masukkan ID Teman..."><button onclick="window.app.addFriend()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:10px; color:white; font-weight:600;">Simpan</button></div></div>

    <div class="overlay" id="popProfile" onclick="closeOverlay(event)">
        <div class="sheet">
            <h3>Edit Profil</h3>
            <div style="text-align:center; margin-bottom:15px;">
                <img id="pfpEdit" src="" class="pfp" style="width:80px; height:80px; margin:0 auto;">
                <br><button onclick="document.getElementById('filePfp').click()" style="background:none; border:none; color:var(--accent); margin-top:5px; font-weight:600;">Ubah Foto</button>
                <input type="file" id="filePfp" accept="image/*" style="display:none" onchange="window.app.handlePfp(this)">
            </div>
            <input type="text" id="editName" placeholder="Nama Anda">
            <input type="text" id="editBio" placeholder="Bio singkat...">
            <button onclick="window.app.updateProfile()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:10px; color:white; font-weight:600;">Update</button>
        </div>
    </div>

    <div id="toast" class="toast-msg">ID Berhasil Disalin!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCHr0eemIkfHNFDUkSaFDklp_c1OgmSnl8",
            authDomain: "mybro-9ba5f.firebaseapp.com",
            databaseURL: "https://mybro-9ba5f-default-rtdb.firebaseio.com/",
            projectId: "mybro-9ba5f"
        };
        const app_fire = initializeApp(firebaseConfig);
        const db = getDatabase(app_fire);

        let myID = localStorage.getItem('mybro_id') || "BRO-" + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('mybro_id', myID);
        document.getElementById('displayID').innerText = "ID: " + myID;

        let activeTarget = null;
        let pfpBaseBase64 = "";

        // UI Logic
        window.showTab = (id, el) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        };

        window.toggleOverlay = (id, show) => {
            const el = document.getElementById(id);
            if(show) { el.style.display = 'flex'; setTimeout(() => el.classList.add('active'), 10); }
            else { el.classList.remove('active'); setTimeout(() => el.style.display = 'none', 300); }
        };

        window.closeOverlay = (e) => { if(e.target.classList.contains('overlay')) toggleOverlay(e.target.id, false); };

        window.copyID = () => {
            navigator.clipboard.writeText(myID);
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        };

        // App Logic
        window.app = {
            handlePfp: (input) => {
                const reader = new FileReader();
                reader.readAsDataURL(input.files[0]);
                reader.onload = () => { pfpBaseBase64 = reader.result; document.getElementById('pfpEdit').src = pfpBaseBase64; };
            },
            updateProfile: () => {
                const name = document.getElementById('editName').value;
                const bio = document.getElementById('editBio').value;
                const data = { name, bio };
                if(pfpBaseBase64) data.pfp = pfpBaseBase64;
                update(ref(db, `users/${myID}/profile`), data);
                toggleOverlay('popProfile', false);
            },
            addFriend: () => {
                const tid = document.getElementById('targetID').value.trim().toUpperCase();
                if(!tid || tid === myID) return;
                set(ref(db, `users/${myID}/contacts/${tid}`), { id: tid, archived: false });
                toggleOverlay('popAdd', false);
            },
            openChat: (id, name, pfp) => {
                activeTarget = id;
                document.getElementById('chatName').innerText = name;
                document.getElementById('chatPfp').src = pfp;
                document.getElementById('chatPanel').classList.add('active');
                
                const room = [myID, id].sort().join("_");
                onValue(ref(db, `chats/${room}`), (snap) => {
                    const area = document.getElementById('msgArea');
                    area.innerHTML = "";
                    snap.forEach(child => {
                        const m = child.val();
                        area.innerHTML += `<div class="bubble ${m.from === myID ? 'sent' : 'received'}">${m.text}</div>`;
                    });
                    area.scrollTop = area.scrollHeight;
                });
            },
            closeChat: () => { document.getElementById('chatPanel').classList.remove('active'); activeTarget = null; },
            send: () => {
                const inp = document.getElementById('msgIn');
                if(!inp.value || !activeTarget) return;
                const room = [myID, activeTarget].sort().join("_");
                push(ref(db, `chats/${room}`), { from: myID, text: inp.value, time: Date.now() });
                inp.value = "";
            },
            uploadStory: (input) => {
                const reader = new FileReader();
                reader.readAsDataURL(input.files[0]);
                reader.onload = () => {
                    push(ref(db, `stories/${myID}`), { media: reader.result, time: Date.now(), views: 0 });
                };
            }
        };

        // Initialize user profile
        get(ref(db, `users/${myID}/profile`)).then(snap => {
            if(!snap.exists()) set(ref(db, `users/${myID}/profile`), { name: "User " + myID.split('-')[1], bio: "Hello!", pfp: "" });
        });

        // Sync Data Realtime
        onValue(ref(db, `users/${myID}/profile`), snap => {
            const d = snap.val(); if(!d) return;
            document.getElementById('vProfileName').innerText = d.name;
            document.getElementById('vProfileBio').innerText = d.bio;
            const pfp = d.pfp || `https://ui-avatars.com/api/?name=${d.name}`;
            document.getElementById('vProfilePfp').src = pfp;
            document.getElementById('myStatusPfp').src = pfp;
        });

        onValue(ref(db, `users/${myID}/contacts`), snap => {
            const list = document.getElementById('contactList');
            const chatList = document.getElementById('chatList');
            list.innerHTML = ""; chatList.innerHTML = "";
            snap.forEach(child => {
                const cid = child.key;
                onValue(ref(db, `users/${cid}/profile`), pSnap => {
                    const p = pSnap.val() || { name: cid, bio: "No bio", pfp: "" };
                    const pfp = p.pfp || `https://ui-avatars.com/api/?name=${p.name}`;
                    
                    // Card Teman
                    const card = document.createElement('div'); card.className = 'card';
                    card.innerHTML = `<img src="${pfp}" class="pfp" style="width:45px;height:45px"><div class="card-info"><div class="card-name">${p.name}</div><div class="card-msg">${p.bio}</div></div>`;
                    card.onclick = () => window.app.openChat(cid, p.name, pfp);
                    list.appendChild(card);

                    // Card Chat
                    const cCard = card.cloneNode(true);
                    cCard.onclick = () => window.app.openChat(cid, p.name, pfp);
                    chatList.appendChild(cCard);
                });
            });
        });
    </script>
</body>
</html>
