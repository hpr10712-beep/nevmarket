<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkSky - Connect the World</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0e11;
            --surface-color: #15191c;
            --accent-color: #00a8ff;
            --accent-gradient: linear-gradient(135deg, #00a8ff, #0066ff);
            --text-main: #e9edef;
            --text-muted: #8696a0;
            --chat-me: #005c4b;
            --chat-other: #202c33;
            --overlay-bg: rgba(0, 0, 0, 0.75);
            --modal-bg: rgba(30, 36, 40, 0.9);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        header { 
            background-color: var(--surface-color); 
            padding: 18px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #2a2f32;
        }
        header h1 { font-size: 1.4rem; color: var(--accent-color); letter-spacing: 1px; }

        /* Main Container */
        main { flex: 1; overflow-y: auto; position: relative; scroll-behavior: smooth; }
        .tab-content { display: none; padding: 15px; animation: slideUp 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Navigation */
        nav { 
            background-color: var(--surface-color); 
            display: flex; 
            padding: 8px 0; 
            border-top: 1px solid #2a2f32;
        }
        .nav-item { 
            background: none; border: none; color: var(--text-muted); 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            gap: 4px; cursor: pointer; transition: 0.3s; font-size: 0.75rem;
        }
        .nav-item i { font-size: 1.2rem; }
        .nav-item.active { color: var(--accent-color); }

        /* Card & List Styling */
        .btn-group {
            background: var(--accent-gradient);
            color: white; border: none; padding: 15px; width: 100%;
            border-radius: 12px; font-weight: bold; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0, 168, 255, 0.3);
        }
        .btn-group:active { transform: scale(0.98); }

        .list-item { 
            display: flex; align-items: center; padding: 12px; 
            background-color: rgba(255,255,255,0.03); border-radius: 15px; 
            margin-bottom: 10px; cursor: pointer; transition: 0.2s;
        }
        .list-item:hover { background-color: rgba(255,255,255,0.08); }
        
        .avatar { 
            width: 50px; height: 50px; border-radius: 50%; 
            background: #313d45; display: flex; justify-content: center; 
            align-items: center; margin-right: 15px; position: relative;
            object-fit: cover;
        }
        .avatar i { font-size: 1.5rem; color: #919191; }

        .info { flex: 1; }
        .info h4 { font-size: 1rem; margin-bottom: 4px; }
        .info p { color: var(--text-muted); font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Settings Form */
        .section-title { color: var(--accent-color); font-size: 0.9rem; margin: 15px 0 10px 5px; text-transform: uppercase; }
        .form-card { background: var(--surface-color); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; }
        .form-group input, .form-group textarea { 
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #2a2f32;
            background: #1e2428; color: white; outline: none; transition: 0.3s;
        }
        .form-group input:focus { border-color: var(--accent-color); }
        .form-group input[readonly] { color: #555; background: #111; }

        .btn-save { 
            background: var(--accent-gradient); color: white; border: none; 
            padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer;
        }

        /* Chat Overlay */
        #chat-window { 
            position: fixed; top: 0; left: 100%; width: 100%; height: 100%; 
            background: var(--bg-color); z-index: 100; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        #chat-window.open { left: 0; }
        .chat-header { 
            background: var(--surface-color); padding: 12px 15px; display: flex; 
            align-items: center; border-bottom: 1px solid #2a2f32; gap: 10px;
        }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .bubble { padding: 10px 14px; border-radius: 15px; max-width: 80%; font-size: 0.95rem; line-height: 1.4; position: relative; }
        .bubble.me { background: var(--chat-me); align-self: flex-end; border-bottom-right-radius: 2px; }
        .bubble.other { background: var(--chat-other); align-self: flex-start; border-bottom-left-radius: 2px; }
        
        .chat-footer { background: var(--surface-color); padding: 10px; display: flex; align-items: center; gap: 10px; }
        .chat-footer input { 
            flex: 1; background: #2a2f32; border: none; padding: 12px 18px; 
            border-radius: 25px; color: white; outline: none;
        }
        .btn-round { 
            width: 45px; height: 45px; border-radius: 50%; border: none; 
            background: var(--accent-color); color: white; display: flex; 
            justify-content: center; align-items: center; cursor: pointer;
        }

        /* Modern Popup Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay-bg); display: none; justify-content: center;
            align-items: center; z-index: 200; opacity: 0; transition: opacity 0.3s;
            backdrop-filter: blur(5px);
        }
        .modal-overlay.open { display: flex; opacity: 1; }
        .modal-content {
            background: var(--modal-bg); padding: 25px; border-radius: 20px;
            width: 85%; max-width: 350px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transform: scale(0.8); transition: transform 0.3s;
        }
        .modal-overlay.open .modal-content { transform: scale(1); }
        .modal-icon { font-size: 3rem; color: var(--accent-color); margin-bottom: 15px; }
        .modal-text { font-size: 1rem; color: var(--text-main); margin-bottom: 20px; line-height: 1.4; }
        .modal-btn {
            background: var(--accent-gradient); color: white; border: none;
            padding: 10px 25px; border-radius: 20px; font-weight: bold; cursor: pointer;
        }

    </style>
</head>
<body>

    <header>
        <h1>TalkSky</h1>
        <div style="display: flex; gap: 20px;">
            <i class="fa-solid fa-camera"></i>
            <i class="fa-solid fa-search"></i>
        </div>
    </header>

    <main>
        <div id="tab-obrolan" class="tab-content active">
            <div id="chat-list-container">
                <div class="list-item" onclick="openChat('999', 'TalkSky Developer')">
                    <div class="avatar"><i class="fa-solid fa-users"></i></div>
                    <div class="info">
                        <h4>TalkSky Developer</h4>
                        <p>Admin: Selamat datang di TalkSky!</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-teman" class="tab-content">
            <button class="btn-group" onclick="showPopup('fa-users-plus', 'Fitur Grup Baru segera hadir! Anda akan bisa mengundang hingga 24 anggota.')">
                <i class="fa-solid fa-users-plus"></i> Buat Grup Baru (Maks 24)
            </button>

            <div class="section-title">Tambah Teman</div>
            <div class="form-group" style="display: flex; gap: 8px;">
                <input type="number" id="input-friend-id" placeholder="Masukkan ID Teman...">
                <button class="btn-round" onclick="addFriend()"><i class="fa-solid fa-plus"></i></button>
            </div>

            <div id="friend-list" style="margin-top: 20px;">
                <div class="list-item">
                    <div class="avatar"><i class="fa-solid fa-user"></i></div>
                    <div class="info">
                        <h4>Budi <span style="color:var(--text-muted); font-weight:normal;">(Alias)</span></h4>
                        <p>ID: 12345</p>
                    </div>
                    <i class="fa-solid fa-pen" onclick="showPopup('fa-pen', 'Fitur untuk mengubah nama alias teman sedang dikembangkan.')" style="color:var(--accent-color); padding: 10px;"></i>
                </div>
            </div>
        </div>

        <div id="tab-status" class="tab-content">
            <div class="list-item">
                <div class="avatar" style="border: 2px solid var(--accent-color);"><i class="fa-solid fa-plus"></i></div>
                <div class="info">
                    <h4>Status Saya</h4>
                    <p>Bagikan momen Anda hari ini</p>
                </div>
            </div>
        </div>

        <div id="tab-pengaturan" class="tab-content">
            <div style="text-align: center; margin-bottom: 20px;">
                <div id="profile-pic-container" style="position: relative; display: inline-block;">
                    <div class="avatar" style="width: 100px; height: 100px; margin: 0; font-size: 3rem;">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <button onclick="showPopup('fa-camera', 'Modul pengunggahan foto profil akan segera terintegrasi dengan Firebase Storage.')" style="position: absolute; bottom: 0; right: 0; background: var(--accent-color); border: none; width: 35px; height: 35px; border-radius: 50%; color: white; cursor: pointer;">
                        <i class="fa-solid fa-camera" style="font-size: 1rem;"></i>
                    </button>
                </div>
            </div>

            <div class="section-title">Profil Anda</div>
            <div class="form-card">
                <div class="form-group">
                    <label>ID TalkSky (Permanen)</label>
                    <input type="text" id="my-id" readonly>
                </div>
                <div class="form-group">
                    <label>Nama Tampilan</label>
                    <input type="text" id="my-name" placeholder="Nama Anda">
                </div>
                <div class="form-group">
                    <label>Bio</label>
                    <textarea id="my-bio" rows="2" placeholder="Status bio..."></textarea>
                </div>
            </div>

            <div class="section-title">Personalisasi</div>
            <div class="form-card">
                <div class="form-group">
                    <label>Warna Gelembung Chat</label>
                    <div style="display:flex; gap: 10px; align-items:center;">
                        <input type="color" id="chat-color" value="#005c4b" style="width:50px; height:40px; padding:0; border:none; cursor: pointer; background:none;">
                    </div>
                </div>
            </div>
            
            <button class="btn-save" onclick="saveProfile()">Simpan Perubahan</button>
        </div>
    </main>

    <div id="chat-window">
        <div class="chat-header">
            <i class="fa-solid fa-arrow-left" onclick="closeChat()" style="padding: 10px; cursor: pointer;"></i>
            <div class="avatar" style="width: 35px; height: 35px;"><i class="fa-solid fa-user" style="font-size: 1rem;"></i></div>
            <div style="flex: 1;">
                <h4 id="chat-target-name">Nama</h4>
                <p style="font-size: 0.7rem; color: var(--accent-color);">Online</p>
            </div>
            <div style="display:flex; gap: 15px; color: var(--accent-color);">
                <i class="fa-solid fa-video" onclick="showPopup('fa-video', 'Fitur panggilan video terenkripsi sedang dalam tahap uji coba internal.')"></i>
                <i class="fa-solid fa-phone" onclick="showPopup('fa-phone', 'Fitur panggilan suara berkualitas HD segera hadir di TalkSky.')"></i>
            </div>
        </div>
        <div class="chat-messages" id="chat-box"></div>
        <div class="chat-footer">
            <i class="fa-solid fa-plus" style="color: var(--text-muted); padding: 10px; cursor: pointer;"></i>
            <input type="text" id="msg-input" placeholder="Ketik pesan...">
            <button class="btn-round" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <nav>
        <button class="nav-item active" onclick="switchTab('obrolan')"><i class="fa-solid fa-message"></i>Obrolan</button>
        <button class="nav-item" onclick="switchTab('status')"><i class="fa-solid fa-circle-notch"></i>Status</button>
        <button class="nav-item" onclick="switchTab('teman')"><i class="fa-solid fa-user-group"></i>Kontak</button>
        <button class="nav-item" onclick="switchTab('pengaturan')"><i class="fa-solid fa-gear"></i>Pengaturan</button>
    </nav>

    <div id="modal-overlay" class="modal-overlay" onclick="closePopup()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <i id="modal-icon" class="fa-solid modal-icon"></i>
            <p id="modal-text" class="modal-text">Pesan default.</p>
            <button class="modal-btn" onclick="closePopup()">Oke</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase Config (Tetap Menggunakan Milik Anda)
        const firebaseConfig = {
            apiKey: "AIzaSyCHr0eemIkfHNFDUkSaFDklp_c1OgmSnl8",
            authDomain: "mybro-9ba5f.firebaseapp.com",
            databaseURL: "https://mybro-9ba5f-default-rtdb.firebaseio.com/",
            projectId: "mybro-9ba5f",
            storageBucket: "mybro-9ba5f.appspot.com",
            messagingSenderId: "820948893264",
            appId: "1:820948893264:web:e58e1a175bc90053335b55"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- STATE & PROFIL ---
        let myProfile = JSON.parse(localStorage.getItem('talksky_profile')) || {
            id: Math.floor(10000 + Math.random() * 89999),
            name: "Sky User",
            bio: "Available on TalkSky",
            chatColor: "#005c4b"
        };

        // Render Initial Profile
        const initProfile = () => {
            document.getElementById('my-id').value = myProfile.id;
            document.getElementById('my-name').value = myProfile.name;
            document.getElementById('my-bio').value = myProfile.bio;
            document.getElementById('chat-color').value = myProfile.chatColor;
            document.documentElement.style.setProperty('--chat-me', myProfile.chatColor);
            localStorage.setItem('talksky_profile', JSON.stringify(myProfile));
        };
        initProfile();

        // --- MODERN POPUP LOGIC ---
        window.showPopup = (iconClass, message) => {
            const overlay = document.getElementById('modal-overlay');
            const iconEl = document.getElementById('modal-icon');
            const textEl = document.getElementById('modal-text');

            iconEl.className = `fa-solid ${iconClass} modal-icon`;
            textEl.innerText = message;
            overlay.classList.add('open');
        };

        window.closePopup = () => {
            document.getElementById('modal-overlay').classList.remove('open');
        };

        // Tutup modal dengan tombol Back (Android)
        window.addEventListener('popstate', function(event) {
            const overlay = document.getElementById('modal-overlay');
            if (overlay.classList.contains('open')) {
                overlay.classList.remove('open');
                history.pushState(null, null, window.location.pathname); // Mencegah navigasi back sungguhan
            }
        });
        // Siapkan state historis untuk menangani tombol back
        history.pushState(null, null, window.location.pathname);


        // --- GLOBAL FUNCTIONS ---
        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            event.currentTarget.classList.add('active');
        };

        window.saveProfile = () => {
            myProfile.name = document.getElementById('my-name').value;
            myProfile.bio = document.getElementById('my-bio').value;
            myProfile.chatColor = document.getElementById('chat-color').value;
            localStorage.setItem('talksky_profile', JSON.stringify(myProfile));
            document.documentElement.style.setProperty('--chat-me', myProfile.chatColor);
            
            showPopup('fa-floppy-disk', 'Profil TalkSky Anda telah berhasil diperbarui dan disimpan secara lokal.');
        };

        window.openChat = (id, name) => {
            document.getElementById('chat-target-name').innerText = name;
            document.getElementById('chat-window').classList.add('open');
            loadMessages();
        };

        window.closeChat = () => {
            document.getElementById('chat-window').classList.remove('open');
        };

        // --- CHAT LOGIC ---
        const messagesRef = ref(db, 'chats/global');

        window.sendMessage = () => {
            const inp = document.getElementById('msg-input');
            if(!inp.value.trim()) return;

            push(messagesRef, {
                senderId: myProfile.id,
                name: myProfile.name,
                text: inp.value,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
            inp.value = '';
        };

        function loadMessages() {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            onChildAdded(messagesRef, (snap) => {
                const data = snap.val();
                const isMe = data.senderId === myProfile.id;
                const div = document.createElement('div');
                div.className = `bubble ${isMe ? 'me' : 'other'}`;
                div.innerHTML = `
                    ${!isMe ? `<div style="font-size:0.7rem; font-weight:bold; color:var(--accent-color)">${data.name}</div>` : ''}
                    ${data.text}
                    <div style="font-size:0.6rem; text-align:right; margin-top:4px; opacity:0.6;">${data.time}</div>
                `;
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;
            });
        }

        window.addFriend = () => {
            const idInput = document.getElementById('input-friend-id');
            const id = idInput.value;
            if(!id) return showPopup('fa-circle-xmark', 'Silakan masukkan ID TalkSky teman yang valid terlebih dahulu.');
            
            showPopup('fa-user-plus', `Permintaan pertemanan sedang diproses untuk TalkSky ID: ${id}. Harap tunggu konfirmasi dari pihak bersangkutan.`);
            idInput.value = '';
        }
    </script>
</body>
</html>
