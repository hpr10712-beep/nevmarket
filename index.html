<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBro Chat App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --chat-bubble: #3b82f6;
            --chat-bubble-friend: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        .app-container { width: 100%; max-width: 480px; background-color: var(--bg-color); display: flex; flex-direction: column; height: 100%; border-left: 1px solid var(--card-bg); border-right: 1px solid var(--card-bg); position: relative; }
        
        /* Header */
        .header { padding: 15px 20px; background-color: var(--card-bg); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .header h2 { font-size: 1.2rem; }
        .my-id-badge { background: var(--primary); padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold;}

        /* Content Area */
        .content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 70px; }
        .section { display: none; }
        .section.active { display: block; }

        /* Chat List */
        .chat-item { display: flex; align-items: center; padding: 12px; background: var(--card-bg); border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .chat-item:hover { background: #2c3e50; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: var(--primary); display: flex; justify-content: center; align-items: center; margin-right: 15px; font-weight: bold; }
        .chat-info h4 { margin-bottom: 3px; }
        .chat-info p { font-size: 0.85rem; color: var(--text-muted); }

        /* Chat Room (Inside Obrolan) */
        #chat-room { display: none; flex-direction: column; height: 100%; position: absolute; top: 0; left: 0; width: 100%; background: var(--bg-color); z-index: 10; }
        .chat-header { background: var(--card-bg); padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .chat-header-actions i { margin-left: 15px; cursor: pointer; color: var(--primary); font-size: 1.2rem; }
        .messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 75%; word-wrap: break-word; }
        .msg.sent { align-self: flex-end; background: var(--chat-bubble); border-bottom-right-radius: 2px; }
        .msg.received { align-self: flex-start; background: var(--chat-bubble-friend); border-bottom-left-radius: 2px; }
        .input-area { padding: 10px; background: var(--card-bg); display: flex; align-items: center; gap: 10px; }
        .input-area input { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #0f172a; color: white; outline: none; }
        .action-btn { background: var(--primary); width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: none; color: white; cursor: pointer; }
        .attach-btn { background: transparent; color: var(--text-muted); border: none; font-size: 1.2rem; cursor: pointer;}

        /* Settings Form */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--text-muted); }
        .form-group input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: var(--bg-color); color: white; outline: none; }
        .form-group input[readonly] { background: #1e293b; color: #94a3b8; cursor: not-allowed; }
        .btn-save { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }

        /* Bottom Nav */
        .bottom-nav { position: absolute; bottom: 0; width: 100%; background: var(--card-bg); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid rgba(255,255,255,0.1); z-index: 5; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); cursor: pointer; font-size: 0.8rem; gap: 5px; transition: 0.3s; }
        .nav-item i { font-size: 1.2rem; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h2 id="header-title">Obrolan</h2>
        <div class="my-id-badge" id="my-id-display">ID: ---</div>
    </div>

    <div class="content">
        <div id="obrolan" class="section active">
            <div class="chat-item" onclick="openGlobalChat()">
                <div class="avatar"><i class="fas fa-globe"></i></div>
                <div class="chat-info">
                    <h4>Grup Global (Testing)</h4>
                    <p>Klik untuk masuk ke chat room</p>
                </div>
            </div>
            <p style="color:var(--text-muted); font-size:0.8rem; margin-top:20px; text-align:center;">Chat privat dan Grup (Maks 24) akan muncul di sini.</p>
        </div>

        <div id="status" class="section">
            <div class="chat-item">
                <div class="avatar" style="background: #10b981;"><i class="fas fa-plus"></i></div>
                <div class="chat-info">
                    <h4>Status Saya</h4>
                    <p>Ketuk untuk menambahkan pembaruan status</p>
                </div>
            </div>
        </div>

        <div id="teman" class="section">
            <div class="form-group" style="display:flex; gap:10px;">
                <input type="text" id="add-friend-id" placeholder="Masukkan ID Teman (Contoh: 12345)">
                <button class="action-btn" onclick="addFriend()"><i class="fas fa-user-plus"></i></button>
            </div>
            <hr style="border-color:#334155; margin: 15px 0;">
            <p style="color:var(--text-muted); font-size:0.8rem; margin-bottom: 10px;">Daftar Teman (Bisa di-Alias)</p>
            <div id="friend-list"></div>
        </div>

        <div id="pengaturan" class="section">
            <div style="text-align: center; margin-bottom: 20px;">
                <div class="avatar" style="width:80px; height:80px; margin: 0 auto 10px auto; font-size: 2rem;" id="profile-avatar"><i class="fas fa-camera"></i></div>
                <p style="font-size: 0.8rem; color: var(--primary); cursor:pointer;">Ubah Foto Profil</p>
            </div>
            <div class="form-group">
                <label>ID Pengguna (Tidak Bisa Diganti)</label>
                <input type="text" id="set-id" readonly value="12345">
            </div>
            <div class="form-group">
                <label>Nama Anda</label>
                <input type="text" id="set-name" placeholder="Nama Tampilan">
            </div>
            <div class="form-group">
                <label>Bio</label>
                <input type="text" id="set-bio" placeholder="Sedang sibuk...">
            </div>
            <div class="form-group">
                <label>Warna Bubble Chat</label>
                <input type="color" id="set-color" value="#3b82f6" style="height: 40px; padding: 2px;">
            </div>
            <button class="btn-save" onclick="saveProfile()">Simpan Pengaturan</button>
        </div>
    </div>

    <div id="chat-room">
        <div class="chat-header">
            <div style="display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-arrow-left" onclick="closeChat()" style="cursor: pointer; color: white;"></i>
                <div class="avatar" style="width:35px; height:35px; margin:0;" id="room-avatar">G</div>
                <h3 id="room-name" style="font-size:1.1rem;">Grup Global</h3>
            </div>
            <div class="chat-header-actions">
                <i class="fas fa-phone" onclick="alertFeature('Telepon Suara (WebRTC)')"></i>
                <i class="fas fa-video" onclick="alertFeature('Video Call (WebRTC)')"></i>
            </div>
        </div>
        <div class="messages" id="messages-container"></div>
        <div class="input-area">
            <button class="attach-btn" onclick="alertFeature('Kirim File/Gambar/Sherlok')"><i class="fas fa-paperclip"></i></button>
            <input type="text" id="message-input" placeholder="Ketik pesan..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button class="attach-btn" onclick="alertFeature('Pesan Suara')"><i class="fas fa-microphone"></i></button>
            <button class="action-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('obrolan', this)">
            <i class="fas fa-comment-dots"></i><span>Obrolan</span>
        </div>
        <div class="nav-item" onclick="switchTab('status', this)">
            <i class="fas fa-circle-notch"></i><span>Status</span>
        </div>
        <div class="nav-item" onclick="switchTab('teman', this)">
            <i class="fas fa-users"></i><span>Teman</span>
        </div>
        <div class="nav-item" onclick="switchTab('pengaturan', this)">
            <i class="fas fa-cog"></i><span>Pengaturan</span>
        </div>
    </div>
</div>

<script type="module">
    // Menggunakan konfigurasi Firebase Anda
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCHr0eemIkfHNFDUkSaFDklp_c1OgmSnl8",
      authDomain: "mybro-9ba5f.firebaseapp.com",
      databaseURL: "https://mybro-9ba5f-default-rtdb.firebaseio.com/",
      projectId: "mybro-9ba5f",
      storageBucket: "mybro-9ba5f.appspot.com",
      messagingSenderId: "820948893264",
      appId: "1:820948893264:web:e58e1a175bc90053335b55"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Identitas Pengguna Lokal (Simulasi)
    let myId = localStorage.getItem('mybro_id');
    if (!myId) {
        myId = Math.floor(10000 + Math.random() * 90000).toString(); // Generate 5 digit ID
        localStorage.setItem('mybro_id', myId);
        localStorage.setItem('mybro_name', 'User ' + myId);
        localStorage.setItem('mybro_color', '#3b82f6');
    }
    
    // Set UI Variables
    document.getElementById('my-id-display').innerText = 'ID: ' + myId;
    document.getElementById('set-id').value = myId;
    document.getElementById('set-name').value = localStorage.getItem('mybro_name');
    document.getElementById('set-color').value = localStorage.getItem('mybro_color');
    document.documentElement.style.setProperty('--chat-bubble', localStorage.getItem('mybro_color'));

    // --- UI Navigation Logic ---
    window.switchTab = function(tabId, el) {
        document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        el.classList.add('active');

        document.getElementById('header-title').innerText = tabId.charAt(0).toUpperCase() + tabId.slice(1);
    }

    // --- Chat Logic ---
    window.openGlobalChat = function() {
        document.getElementById('chat-room').style.display = 'flex';
    }

    window.closeChat = function() {
        document.getElementById('chat-room').style.display = 'none';
    }

    window.sendMessage = function() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if(text === "") return;

        const chatRef = ref(db, 'chats/global');
        push(chatRef, {
            senderId: myId,
            senderName: localStorage.getItem('mybro_name'),
            message: text,
            timestamp: Date.now()
        });

        input.value = '';
    }

    // Listen for incoming messages
    const chatRef = ref(db, 'chats/global');
    onChildAdded(chatRef, (snapshot) => {
        const data = snapshot.val();
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('msg');
        
        // Cek apakah pesan dari kita atau orang lain
        if(data.senderId === myId) {
            msgDiv.classList.add('sent');
            msgDiv.innerHTML = `<span>${data.message}</span>`;
        } else {
            msgDiv.classList.add('received');
            msgDiv.innerHTML = `<span style="font-size:0.7rem; color:#94a3b8; display:block; margin-bottom:3px;">${data.senderName} (ID: ${data.senderId})</span><span>${data.message}</span>`;
        }

        const container = document.getElementById('messages-container');
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    });

    // --- Profile & Friends Logic ---
    window.saveProfile = function() {
        const newName = document.getElementById('set-name').value;
        const newColor = document.getElementById('set-color').value;
        localStorage.setItem('mybro_name', newName);
        localStorage.setItem('mybro_color', newColor);
        document.documentElement.style.setProperty('--chat-bubble', newColor);
        
        // Save to Firebase (Opsional, untuk dibaca teman)
        set(ref(db, 'users/' + myId), {
            name: newName,
            bio: document.getElementById('set-bio').value
        });

        alert("Profil berhasil disimpan!");
    }

    window.addFriend = function() {
        const friendId = document.getElementById('add-friend-id').value;
        if(friendId === myId) return alert("Tidak bisa menambahkan ID sendiri.");
        if(friendId.length < 4) return alert("ID tidak valid.");
        
        const alias = prompt("Masukkan Alias / Nama Panggilan untuk ID " + friendId + ":");
        if(alias) {
            // Simulasi simpan teman di Local UI (Biasanya disimpan di Firebase ref('friends/'+myId))
            const friendList = document.getElementById('friend-list');
            const fDiv = document.createElement('div');
            fDiv.classList.add('chat-item');
            fDiv.innerHTML = `
                <div class="avatar" style="background:#8b5cf6"><i class="fas fa-user"></i></div>
                <div class="chat-info">
                    <h4>${alias} <span style="font-size:0.7rem; color:var(--text-muted)">(ID: ${friendId})</span></h4>
                    <p>Klik untuk Chat Pribadi</p>
                </div>
            `;
            friendList.appendChild(fDiv);
            document.getElementById('add-friend-id').value = '';
            alert("Teman berhasil ditambahkan!");
        }
    }

    window.alertFeature = function(featureName) {
        alert("Fitur " + featureName + " memerlukan integrasi Firebase Storage (untuk file) atau Server WebRTC (untuk panggilan audio/video). Ini adalah area di mana logika lanjutan akan dibangun.");
    }
</script>

</body>
</html>
