<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200"> 
    <title>Elite Laga | Desktop Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at 50% -20%, #1e1b4b, #020617);
            font-family: 'Inter', sans-serif;
            color: #e2e8f0;
            /* Memastikan lebar body tetap luas */
            width: 1200px; 
            margin: 0 auto;
        }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glow-blue:hover { border-color: #3b82f6; box-shadow: 0 0 30px rgba(59, 130, 246, 0.3); }
        .glow-red:hover { border-color: #ef4444; box-shadow: 0 0 30px rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body>

    <nav class="border-b border-white/10 py-6 px-8 flex justify-between items-center bg-slate-950/50">
        <div class="flex items-center gap-4">
            <div class="h-10 w-10 bg-gradient-to-tr from-yellow-500 to-orange-600 rounded-lg rotate-12 flex items-center justify-center">
                <span class="text-white font-black">L</span>
            </div>
            <h1 class="font-orbitron text-2xl font-black tracking-widest uppercase">LAGA PRO</h1>
        </div>
        <div class="flex items-center gap-6">
            <div class="text-right">
                <p class="text-[10px] text-slate-500 font-bold uppercase">Available Credit</p>
                <p id="balanceTxt" class="text-xl font-orbitron font-bold text-yellow-400">Rp 0</p>
            </div>
        </div>
    </nav>

    <main class="w-full py-12 px-10">
        <div class="text-center mb-16">
            <h2 class="text-5xl font-orbitron font-black mb-4 uppercase italic">SIAPA JAGOANMU?</h2>
            <p class="text-slate-400">Pilih salah satu pemain. Hasil otomatis muncul di sini.</p>
        </div>

        <div class="grid grid-cols-2 gap-10">
            <div class="glass-card rounded-[3rem] p-10 glow-blue transition-all group">
                <div class="mb-8 rounded-2xl h-80 bg-slate-900 flex items-center justify-center">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=A" class="h-56">
                </div>
                <h3 class="text-3xl font-orbitron font-bold mb-2">SATRIA BIRU</h3>
                <div class="flex justify-between border-y border-white/5 py-4 mb-8">
                    <span class="text-slate-500">Multiplier</span>
                    <span class="text-blue-400 font-bold font-orbitron">2.00x</span>
                </div>
                <input type="number" id="amtA" class="w-full bg-slate-950 p-5 rounded-2xl mb-4 text-center text-xl font-bold font-orbitron" placeholder="Masukkan Jumlah">
                <button onclick="bet('A')" class="w-full bg-blue-600 py-5 rounded-2xl font-black font-orbitron tracking-widest">CONFIRM PICK A</button>
            </div>

            <div class="glass-card rounded-[3rem] p-10 glow-red transition-all group">
                <div class="mb-8 rounded-2xl h-80 bg-slate-900 flex items-center justify-center">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=B" class="h-56">
                </div>
                <h3 class="text-3xl font-orbitron font-bold mb-2">NAGA MERAH</h3>
                <div class="flex justify-between border-y border-white/5 py-4 mb-8">
                    <span class="text-slate-500">Multiplier</span>
                    <span class="text-red-400 font-bold font-orbitron">2.00x</span>
                </div>
                <input type="number" id="amtB" class="w-full bg-slate-950 p-5 rounded-2xl mb-4 text-center text-xl font-bold font-orbitron" placeholder="Masukkan Jumlah">
                <button onclick="bet('B')" class="w-full bg-red-600 py-5 rounded-2xl font-black font-orbitron tracking-widest">CONFIRM PICK B</button>
            </div>
        </div>
    </main>

    <script>
        // Logika Saldo & BroadcastChannel tetap sama seperti sebelumnya
        let balance = parseInt(localStorage.getItem('mega_balance')) || 10000000;
        let currentBet = null;
        const bc = new BroadcastChannel('laga_premium');

        function sync() {
            document.getElementById('balanceTxt').innerText = `Rp ${balance.toLocaleString('id-ID')}`;
            localStorage.setItem('mega_balance', balance);
        }

        function bet(p) {
            const val = parseInt(document.getElementById('amt' + p).value);
            if(!val || val <= 0 || val > balance) return Swal.fire('Error', 'Saldo tidak cukup!', 'error');
            balance -= val;
            currentBet = { p, val };
            sync();
            Swal.fire('Sukses', 'Taruhan dipasang!', 'success');
        }

        bc.onmessage = (e) => {
            if(e.data.type === 'RESULT' && currentBet) {
                if(currentBet.p === e.data.winner) {
                    balance += (currentBet.val * 2);
                    Swal.fire('MENANG!', 'Saldo berlipat ganda!', 'success');
                } else {
                    Swal.fire('KALAH!', 'Coba lagi!', 'error');
                }
                currentBet = null;
                sync();
            }
        };
        sync();
    </script>
</body>
</html>
