<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>ELITE LAGA | ARENA OTOMATIS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: white; width: 1200px; margin: 0 auto; padding: 20px; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .neon-blue { border-bottom: 4px solid #3b82f6; box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.5); }
        .neon-red { border-bottom: 4px solid #ef4444; box-shadow: 0 10px 30px -10px rgba(239, 68, 68, 0.5); }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center mb-8 glass p-8 rounded-[2.5rem] border-t-2 border-yellow-500/30">
        <div class="flex items-center gap-5">
            <div class="h-14 w-14 bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-2xl flex items-center justify-center font-black text-black text-2xl font-orbitron shadow-lg">L</div>
            <div>
                <h2 id="playerID" class="font-orbitron text-xl font-black text-white italic tracking-widest uppercase">MEMUAT ID...</h2>
                <p class="text-[10px] text-green-500 font-bold tracking-[0.4em] animate-pulse">STATUS: CONNECTED</p>
            </div>
        </div>
        <div class="glass px-12 py-4 rounded-3xl border-r-4 border-yellow-500 text-right">
            <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">SALDO AKTIF</p>
            <h2 id="balanceTxt" class="text-3xl font-orbitron font-black text-yellow-400 italic">Rp 0</h2>
        </div>
    </nav>

    <div class="grid grid-cols-2 gap-10">
        <div class="glass p-10 rounded-[3.5rem] text-center neon-blue hover:scale-[1.02] transition-transform">
            <h3 class="text-2xl font-orbitron font-black mb-6 tracking-widest text-blue-400">SATRIA BIRU</h3>
            <input type="number" id="amtA" class="w-full bg-slate-950 border border-slate-800 p-5 rounded-2xl mb-6 text-center text-2xl font-orbitron font-bold text-white outline-none focus:border-blue-500" placeholder="0.00">
            <button onclick="placeBet('A')" class="w-full bg-blue-600 py-5 rounded-2xl font-black font-orbitron text-xl shadow-lg active:scale-95 transition-all">PICK A</button>
        </div>

        <div class="glass p-10 rounded-[3.5rem] text-center neon-red hover:scale-[1.02] transition-transform">
            <h3 class="text-2xl font-orbitron font-black mb-6 tracking-widest text-red-400">NAGA MERAH</h3>
            <input type="number" id="amtB" class="w-full bg-slate-950 border border-slate-800 p-5 rounded-2xl mb-6 text-center text-2xl font-orbitron font-bold text-white outline-none focus:border-red-500" placeholder="0.00">
            <button onclick="placeBet('B')" class="w-full bg-red-600 py-5 rounded-2xl font-black font-orbitron text-xl shadow-lg active:scale-95 transition-all">PICK B</button>
        </div>
    </div>

    <div class="mt-10 rounded-[2.5rem] overflow-hidden border border-white/5 relative h-80">
        <video autoplay muted loop class="w-full h-full object-cover opacity-30">
            <source src="36577.mp4" type="video/mp4">
        </video>
        <div class="absolute inset-0 flex items-center justify-center">
            <p class="font-orbitron font-bold text-white/20 tracking-[1.5em] text-2xl">LIVE STREAM</p>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // PERBAIKAN DI SINI (Tanda kutip sudah diperbaiki)
    const firebaseConfig = {
        apiKey: "AIzaSyCHr0eemIkfHNFDUkSaFDklp_c1OgmSnl8",
        databaseURL: "https://mybro-9ba5f-default-rtdb.firebaseio.com",
        projectId: "mybro-9ba5f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // LOGIKA ID UNIK OTOMATIS
    let myID = localStorage.getItem('laga_player_id');
    if (!myID) {
        myID = 'PLAYER-' + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('laga_player_id', myID);
    }
    
    // Memastikan teks ID berubah dari "MEMUAT ID..." menjadi ID asli
    document.getElementById('playerID').innerText = myID;

    const myRef = ref(db, 'users/' + myID);
    let myBalance = 0;

    // Sinkronisasi Saldo Real-time
    onValue(myRef, (snap) => {
        if (!snap.exists()) {
            set(myRef, { balance: 0 }); 
        } else {
            myBalance = snap.val().balance || 0;
            document.getElementById('balanceTxt').innerText = `Rp ${myBalance.toLocaleString('id-ID')}`;
        }
    }, (error) => {
        console.error("Firebase Error:", error);
        if(error.message.includes("permission_denied")) {
            Swal.fire('Eror Rules', 'Database masih terkunci! Ubah Rules di Firebase jadi true.', 'error');
        }
    });

    window.placeBet = (side) => {
        const amtInput = document.getElementById('amt' + side);
        const amt = parseInt(amtInput.value);
        if (!amt || amt > myBalance) return Swal.fire('Gagal', 'Saldo tidak cukup!', 'error');
        
        update(myRef, { balance: myBalance - amt });
        amtInput.value = ""; // Kosongkan input setelah bet
        Swal.fire('Berhasil', `Taruhan ${side} sebesar Rp ${amt.toLocaleString()} diterima!`, 'success');
    };
</script>

</body>
</html>
