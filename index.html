<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radz Store Elite</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

body{
  margin:0;
  font-family:'Orbitron',monospace;
  background:#000;
  color:#fff;
}

/* BACKGROUND */
#bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
  opacity:0.2;
}
#bg video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

/* TITLE */
h1{
  text-align:center;
  font-size:40px;
  background:linear-gradient(90deg,#ff6b6b,#4ecdc4);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  margin-top:20px;
  box-shadow:0 0 20px rgba(255,107,107,0.3);
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff6b6b,#4ecdc4);
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  transform:scale(1.05);
}

/* DASHBOARD */
.dashboard{
  display:none;
}

.profile{
  display:flex;
  align-items:center;
  gap:15px;
}

.profile img{
  width:60px;
  height:60px;
  border-radius:50%;
  border:2px solid #ff6b6b;
}

.banner img{
  width:100%;
  border-radius:15px;
  margin-top:20px;
}

.action{
  display:flex;
  gap:10px;
  margin-top:20px;
}
.action button{
  flex:1;
}

.hidden{display:none;}
</style>
</head>

<body>

<div id="bg">
  <video autoplay muted loop>
    <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-neon-lines-in-motion-12166-large.mp4">
  </video>
</div>

<div class="container">

<h1>RADZ STORE</h1>

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">LOGIN</button>
  <div id="status"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

  <div class="card profile">
    <img src="https://i.ibb.co.com/yFpkJnMd/63b71c0e-3570-4880-a29c-ad16398d90f3.jpg">
    <div>
      <b id="userEmail"></b><br>
      <small style="color:#aaa;">Status: Active</small>
    </div>
  </div>

  <div class="card banner">
    <img src="https://i.pinimg.com/originals/5e/8c/63/5e8c632d8b63b85d76f3a1dfb8e1b1c2.gif">
  </div>

  <div class="action">
    <button onclick="alert('Fitur Coming Soon')">FITUR 1</button>
    <button onclick="alert('Fitur Coming Soon')">FITUR 2</button>
  </div>

  <div class="card">
    <button onclick="logout()">LOGOUT</button>
  </div>

</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAgGd8-u_E_JKKs0Zf7rXZ6O4ADw85CUAU",
  authDomain: "radzpanel-3a8a3.firebaseapp.com",
  projectId: "radzpanel-3a8a3",
  storageBucket: "radzpanel-3a8a3.firebasestorage.app",
  messagingSenderId: "20608954308",
  appId: "1:20608954308:web:0e09ba796c9086813fbe91"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// LOGIN
window.login = function(){
  signInWithEmailAndPassword(auth,email.value,password.value)
  .then(res=>{
    document.getElementById("loginBox").style.display="none";
    document.getElementById("dashboard").style.display="block";
    userEmail.innerText = res.user.email;
  })
  .catch(err=>{
    status.innerHTML = "<p style='color:red'>"+err.message+"</p>";
  });
};

// AUTO LOGIN
onAuthStateChanged(auth,user=>{
  if(user){
    loginBox.style.display="none";
    dashboard.style.display="block";
    userEmail.innerText = user.email;
  }
});

// LOGOUT
window.logout = function(){
  signOut(auth).then(()=>location.reload());
};
</script>

</body>
</html>
