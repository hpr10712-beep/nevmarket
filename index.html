<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-value=1"> 
    <title>ELITE ARENA | OFFICIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; 
            margin: 0 auto; width: 1200px; padding: 40px 0;
            background-image: radial-gradient(circle at top right, #1e293b, #020617 60%);
        }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }

        /* --- STYLING PROFIL BARU --- */
        .profile-box {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 15px 30px 15px 15px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .avatar-circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid #fbbf24; /* Border Emas */
            overflow: hidden;
            background: #000;
            flex-shrink: 0;
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1px;
            border: 1px solid rgba(74, 222, 128, 0.2);
            margin-top: 6px;
        }

        /* --- SALDO DIAMOND --- */
        .saldo-card {
            background: #0f172a;
            border: 1px solid rgba(251, 191, 36, 0.4);
            border-right: 6px solid #fbbf24;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* --- ARENA & VIDEO --- */
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Gambar Karakter Lingkaran */
        .char-circle {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 4px solid rgba(255,255,255,0.1);
            overflow: hidden;
            background: #000;
        }
        .char-circle img { width: 100%; height: 100%; object-fit: cover; }

        .rgb-frame {
            position: relative; border-radius: 40px; padding: 6px;
            background: linear-gradient(var(--angle), #fbbf24, #ef4444, #3b82f6, #fbbf24);
            --angle: 0deg; animation: rotateBorder 4s linear infinite;
        }
        @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
        @keyframes rotateBorder { to { --angle: 360deg; } }
        .video-box { background: #000; border-radius: 35px; overflow: hidden; height: 550px; width: 100%; }

.video-box {
    background-color: #000; /* Agar tidak muncul putih saat loading */
    aspect-ratio: 16 / 9;   /* Menjaga bentuk video tetap proporsional */
    overflow: hidden;
}

        
    </style>
</head>
<body>

    <div class="flex justify-between items-center px-10 mb-12">
        
        <div class="profile-box">
            <div class="avatar-circle">
                <img src="https://i.ibb.co.com/pqyBmFQ/eedd9bb8-f4d4-488b-86a1-3ff00eb9c3c9.jpg" alt="Profile">
            </div>
            <div>
                <h1 id="playerID" class="font-orbitron text-2xl font-black text-white tracking-tighter uppercase leading-none">PLAYER_LOADING</h1>
                <div class="status-badge">
                    <span class="h-1.5 w-1.5 bg-green-500 rounded-full animate-pulse"></span>
                    ONLINE
                </div>
            </div>
        </div>

        <div class="saldo-card px-10 py-5 rounded-2xl min-w-[320px]">
            <p class="text-[10px] text-yellow-500 font-bold uppercase tracking-widest mb-1">Total Saldo</p>
            <h2 id="balanceTxt" class="text-3xl font-orbitron font-black text-white italic">Rp 0</h2>
        </div>
    </div>

    <div class="px-10 grid grid-cols-12 gap-10">
        <div class="col-span-6 glass p-10 rounded-[3.5rem] text-center border-t-[8px] border-blue-600 relative overflow-hidden">
            <div class="char-circle shadow-lg">
                <img src="https://i.ibb.co.com/5hx6y4fN/a3b9d2cd-6c9b-4690-8598-35679ae9cb10.jpg" alt="Unit A">
            </div>
            <h3 class="font-orbitron text-2xl font-bold text-blue-400 mb-6 tracking-widest uppercase">RADZ GT (Striker)</h3>
            <input type="number" id="amtA" class="w-full bg-slate-900 border border-slate-700 p-5 rounded-2xl mb-6 text-center text-3xl font-orbitron font-bold text-white outline-none focus:border-blue-500" placeholder="0">
            <button onclick="placeBet('A')" class="w-full bg-blue-600 hover:bg-blue-500 py-6 rounded-2xl font-orbitron font-black text-xl text-white uppercase transition-all shadow-xl">DEPLOY UNIT A</button>
        </div>

        <div class="col-span-6 glass p-10 rounded-[3.5rem] text-center border-t-[8px] border-red-600 relative overflow-hidden">
            <div class="char-circle shadow-lg">
                <img src="https://i.ibb.co.com/PJRGbMp/771bd209-5182-45b9-8d06-db7a4698d2ba.jpg" alt="Unit B">
            </div>
            <h3 class="font-orbitron text-2xl font-bold text-red-400 mb-6 tracking-widest uppercase">ALYA VM (Hunter)</h3>
            <input type="number" id="amtB" class="w-full bg-slate-900 border border-slate-700 p-5 rounded-2xl mb-6 text-center text-3xl font-orbitron font-bold text-white outline-none focus:border-red-500" placeholder="0">
            <button onclick="placeBet('B')" class="w-full bg-red-600 hover:bg-red-500 py-6 rounded-2xl font-orbitron font-black text-xl text-white uppercase transition-all shadow-xl">DEPLOY UNIT B</button>
        </div>

        <div class="col-span-12 mt-4 mb-10">
            <div class="rgb-frame shadow-2xl">
                <div class="video-box">
    <iframe 
        src="https://www.tiktok.com/player/v1/7488059737937186064?autoplay=1&mute=1" 
        class="w-full h-full" 
        frameborder="0" 
        allow="autoplay; encrypted-media" 
        allowfullscreen>
    </iframe>
</div>

            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCHr0eemIkfHNFDUkSaFDklp_c1OgmSnl8",
        databaseURL: "https://mybro-9ba5f-default-rtdb.firebaseio.com",
        projectId: "mybro-9ba5f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myID = localStorage.getItem('laga_player_id') || 'USER-' + Math.floor(1000 + Math.random() * 9000);
    localStorage.setItem('laga_player_id', myID);
    document.getElementById('playerID').innerText = myID;

    const myRef = ref(db, 'users/' + myID);
    let myBalance = 0;

    onValue(myRef, (snap) => {
        if (!snap.exists()) { set(myRef, { balance: 0 }); }
        else {
            myBalance = snap.val().balance || 0;
            document.getElementById('balanceTxt').innerText = `Rp ${myBalance.toLocaleString('id-ID')}`;
        }
    });

    onValue(ref(db, 'match/result'), (snap) => {
        const winner = snap.val();
        if (!winner) return;
        const side = localStorage.getItem('last_side');
        const amt = parseInt(localStorage.getItem('last_amt') || 0);

        if (side === winner && amt > 0) {
            update(myRef, { balance: myBalance + (amt * 2) });
            Swal.fire({ title: 'WIN! 🏆', text: 'Kemenangan Mutlak!', icon: 'success', background: '#0f172a', color: '#fff' });
        } else if (side) {
            Swal.fire({ title: 'LOST', text: 'Unit Hancur!', icon: 'error', background: '#1e1b4b', color: '#fff' });
        }
        localStorage.removeItem('last_side');
        localStorage.removeItem('last_amt');
    });

    window.placeBet = (side) => {
        const amt = parseInt(document.getElementById('amt' + side).value);
        if (!amt || amt > myBalance) return Swal.fire('Error', 'Saldo tidak cukup!', 'error');
        localStorage.setItem('last_side', side);
        localStorage.setItem('last_amt', amt);
        update(myRef, { balance: myBalance - amt });
        document.getElementById('amt' + side).value = "";
        Swal.fire('BERHASIL', `Unit ${side} Terpasang!`, 'success');
    };
</script>

</body>
</html>
