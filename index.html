<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Battle Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at top, #111827, #000000); color: white; min-h-screen; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .neon-blue { border-bottom: 4px solid #3b82f6; box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.5); }
        .neon-red { border-bottom: 4px solid #ef4444; box-shadow: 0 10px 30px -10px rgba(239, 68, 68, 0.5); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto flex justify-between items-center mb-16 animate__animated animate__fadeInDown">
        <div>
            <h1 class="text-4xl font-black italic tracking-tighter text-yellow-500">ELITE LAGA</h1>
            <div class="flex items-center gap-2 text-xs text-green-500 font-bold uppercase tracking-widest">
                <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span></span>
                Server Live
            </div>
        </div>
        <div class="glass p-4 rounded-2xl border-l-4 border-yellow-500">
            <p class="text-[10px] text-gray-400 font-bold uppercase">Saldo Tersimpan</p>
            <h2 id="displayBalance" class="text-2xl font-mono font-black text-white">Rp 0</h2>
        </div>
    </div>

    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="glass p-8 rounded-[2.5rem] text-center transition hover:scale-[1.02] neon-blue">
            <div class="h-48 rounded-3xl bg-gradient-to-br from-blue-600/20 to-transparent mb-6 flex items-center justify-center">
                <span class="text-8xl font-black text-blue-500/30">A</span>
            </div>
            <h3 class="text-2xl font-bold mb-4">SATRIA BIRU</h3>
            <input type="number" id="inputA" class="w-full bg-black/40 border border-gray-700 p-4 rounded-2xl mb-4 focus:ring-2 focus:ring-blue-500 outline-none text-center font-bold" placeholder="Nominal Rp">
            <button onclick="placeBet('A')" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black shadow-lg transition">PICK BLUE (2.0x)</button>
        </div>

        <div class="glass p-8 rounded-[2.5rem] text-center transition hover:scale-[1.02] neon-red">
            <div class="h-48 rounded-3xl bg-gradient-to-br from-red-600/20 to-transparent mb-6 flex items-center justify-center">
                <span class="text-8xl font-black text-red-500/30">B</span>
            </div>
            <h3 class="text-2xl font-bold mb-4">NAGA MERAH</h3>
            <input type="number" id="inputB" class="w-full bg-black/40 border border-gray-700 p-4 rounded-2xl mb-4 focus:ring-2 focus:ring-red-500 outline-none text-center font-bold" placeholder="Nominal Rp">
            <button onclick="placeBet('B')" class="w-full bg-red-600 hover:bg-red-500 py-4 rounded-2xl font-black shadow-lg transition">PICK RED (2.0x)</button>
        </div>
    </div>

    <script>
        // Inisialisasi Data & Saldo (Tersimpan di Browser)
        let balance = parseInt(localStorage.getItem('laga_balance')) || 1000000;
        let activeBet = JSON.parse(localStorage.getItem('active_bet')) || null;
        
        // Channel Real-time (Saling Bicara antar Tab)
        const channel = new BroadcastChannel('laga_system');

        function updateUI() {
            document.getElementById('displayBalance').innerText = `Rp ${balance.toLocaleString()}`;
            localStorage.setItem('laga_balance', balance);
            localStorage.setItem('active_bet', JSON.stringify(activeBet));
        }

        function placeBet(side) {
            const amount = parseInt(document.getElementById('input' + side).value);
            if (isNaN(amount) || amount <= 0 || amount > balance) {
                return Swal.fire('Gagal', 'Saldo tidak cukup atau input salah!', 'error');
            }
            if (activeBet) return Swal.fire('Opps', 'Selesaikan laga sebelumnya!', 'warning');

            balance -= amount;
            activeBet = { side, amount };
            updateUI();
            Swal.fire('Berhasil', `Taruhan Rp ${amount.toLocaleString()} dipasang!`, 'success');
        }

        // MENERIMA SINYAL OTOMATIS DARI ADMIN
        channel.onmessage = (event) => {
            if (event.data.type === 'RESULT' && activeBet) {
                const winner = event.data.winner;
                if (activeBet.side === winner) {
                    const winMoney = activeBet.amount * 2;
                    balance += winMoney;
                    Swal.fire({
                        title: '🎉 JACKPOT!',
                        text: `Jagoanmu menang! Anda dapat Rp ${winMoney.toLocaleString()}`,
                        icon: 'success',
                        background: '#111', color: '#fff'
                    });
                } else {
                    Swal.fire({
                        title: '💀 KALAH!',
                        text: `Jagoanmu tumbang. Saldo hangus!`,
                        icon: 'error',
                        background: '#111', color: '#fff'
                    });
                }
                activeBet = null;
                updateUI();
            }
        };

        updateUI();
    </script>
</body>
</html>
