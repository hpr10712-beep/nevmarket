<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Trading Pro</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 15px; }
    .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(135deg, #1e1e1e, #2a2a2a);
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 15px;
    border: 1px solid #333;
    gap: 10px;
}

.balance-box, .price-box {
    flex: 1;
}

.divider {
    width: 1px;
    height: 35px;
    background: #333;
}

.label {
    font-size: 10px;
    color: #777;
    margin-bottom: 3px;
    letter-spacing: 0.5px;
}

/* ANGKA */
.value {
    font-size: 15px;
    font-weight: 600;
}

/* SALDO ABU */
.balance {
    color: #9e9e9e;
}

/* HARGA HIJAU TUA */
.price-up {
    color: #00a86b;
}

.price-down {
    color: #ff4444;
}
        .balance-box { text-align: left; }
        .balance-box span { font-size: 0.8em; color: #aaa; }
        .balance-box div { font-size: 1.4em; font-weight: bold; color: #00ff88; }
        
        #chart-container { background: #1e1e1e; height: 250px; border-radius: 10px; position: relative; border: 1px solid #333; margin-bottom: 15px; }
        canvas { width: 100%; height: 100%; }

        .trade-info { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid #555; }
        .profit { color: #00ff88; }
        .loss { color: #ff4444; }

        .actions { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
        .btn-buy { background: #00c853; }
        .btn-sell { background: #ff3d00; }
        .btn-close { background: #555; margin-top: 10px; width: 100%; }

        .history { margin-top: 20px; font-size: 0.9em; }
        .history-item { border-bottom: 1px solid #333; padding: 8px 0; display: flex; justify-content: space-between; }
   
.login-container {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at top, #1a1a1a, #0d0d0d);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.login-card {
    background: rgba(30,30,30,0.8);
    backdrop-filter: blur(12px);
    border: 1px solid #333;
    border-radius: 15px;
    padding: 25px;
    width: 90%;
    max-width: 320px;
    text-align: center;
    box-shadow: 0 0 25px rgba(0,255,136,0.15);
}

/* TITLE */
.login-card h2 {
    margin: 0;
    font-size: 20px;
    color: #00ff88;
    letter-spacing: 1px;
}

.subtitle {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 20px;
}

/* INPUT */
.login-card input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid #333;
    background: #121212;
    color: white;
    font-size: 13px;
    outline: none;
}

.login-card input:focus {
    border-color: #00ff88;
    box-shadow: 0 0 8px rgba(0,255,136,0.3);
}

/* BUTTON */
.btn-login {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg,#00c853,#00ff88);
    color: black;
    font-weight: bold;
    margin-bottom: 8px;
    cursor: pointer;
}

.btn-register {
    width: 100%;
    padding: 10px;
    border: 1px solid #444;
    border-radius: 8px;
    background: transparent;
    color: #aaa;
    cursor: pointer;
}

/* HOVER */
.btn-login:hover {
    opacity: 0.9;
}

.btn-register:hover {
    border-color: #00ff88;
    color: #00ff88;
}

 </style> 
</head>
<body>

<div id="loginPage" class="login-container">

    <div class="login-card">
        <h2>TRADING PRO</h2>
        <p class="subtitle">Login ke akun kamu</p>

        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">

        <button class="btn-login" onclick="login()">MASUK</button>
        <button class="btn-register" onclick="register()">DAFTAR</button>
    </div>

</div>

<div id="appPage" style="display:none;">

<div class="header">
    <div class="balance-box">
        <div class="label">SALDO AKUN</div>
        <div id="balanceDisplay" class="value balance">Rp 10.000.000</div>
    </div>

    <div class="divider"></div>

    <div class="price-box" style="text-align:right;">
        <div class="label">HARGA SAAT INI</div>
        <div id="livePrice" class="value price-up">0</div>
    </div>
</div>

    <div id="chart-container">
        <canvas id="tradingChart"></canvas>
    </div>

    <div id="positionCard" class="trade-info" style="display: none;">
        <strong>Posisi Terbuka: <span id="posType"></span></strong><br>
        Harga Beli: <span id="entryPrice">0</span><br>
        P/L: <span id="plDisplay" class="profit">Rp 0</span>
        <button class="btn-close" onclick="closePosition()">TUTUP POSISI (TAKE PROFIT/CUT LOSS)</button>
    </div>

    <div class="actions" id="mainActions">
        <button class="btn-buy" onclick="openPosition('BUY')">BELI (LONG)</button>
        <button class="btn-sell" onclick="openPosition('SELL')">JUAL (SHORT)</button>
    </div>

    <div class="history">
        <strong>Riwayat Transaksi:</strong>
        <div id="historyList"></div>
    </div>

<script>
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { getFirestore, doc, setDoc, getDoc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAgGd8-u_E_JKKs0Zf7rXZ6O4ADw85CUAU",
  authDomain: "radzpanel-3a8a3.firebaseapp.com",
  projectId: "radzpanel-3a8a3",
  storageBucket: "radzpanel-3a8a3.firebasestorage.app",
  messagingSenderId: "20608954308",
  appId: "1:20608954308:web:0e09ba796c9086813fbe91"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ================= AUTH =================

// REGISTER
window.register = async function () {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    const userCred = await createUserWithEmailAndPassword(auth, email, pass);

    // simpan data awal user
    await setDoc(doc(db, "users", userCred.user.uid), {
        balance: 10000000
    });

    alert("Daftar berhasil!");
}

// LOGIN
window.login = async function () {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    await signInWithEmailAndPassword(auth, email, pass);
}

// LOGOUT
window.logout = function () {
    signOut(auth);
}

// ================= LOAD DATA =================
onAuthStateChanged(auth, async (user) => {
    if (user) {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("appPage").style.display = "block";

        const ref = doc(db, "users", user.uid);
        const snap = await getDoc(ref);

        if (snap.exists()) {
            balance = snap.data().balance;
            updateBalanceUI();
        }
    } else {
        document.getElementById("loginPage").style.display = "block";
        document.getElementById("appPage").style.display = "none";
    }
});

// ================= SAVE BALANCE =================
window.saveBalance = async function () {
    const user = auth.currentUser;
    if (!user) return;

    await updateDoc(doc(db, "users", user.uid), {
        balance: balance
    });
}

// === INISIALISASI WAJIB (INI YANG KAMU KURANG) ===
let currentPrice = 50000;
const canvas = document.getElementById('tradingChart');
const ctx = canvas.getContext('2d');

// === DATA CANDLE ===
let candles = [];
let tick = 0;

// === UPDATE MARKET ===
function updateMarket() {
    const change = (Math.random() - 0.5) * 2000000000000;
    currentPrice += change;
    if(currentPrice < 1000) currentPrice = 1000;

    document.getElementById('livePrice').innerText =
        Math.round(currentPrice).toLocaleString('id-ID');

    // buat candle pertama
    if (candles.length === 0) {
        candles.push({
            open: currentPrice,
            high: currentPrice,
            low: currentPrice,
            close: currentPrice
        });
    }

    let last = candles[candles.length - 1];

    // update candle terakhir (biar gerak)
    last.close = currentPrice;
    if (currentPrice > last.high) last.high = currentPrice;
    if (currentPrice < last.low) last.low = currentPrice;

    tick++;

    // bikin candle baru tiap beberapa tick
    if (tick > 10) {
        candles.push({
            open: currentPrice,
            high: currentPrice,
            low: currentPrice,
            close: currentPrice
        });
        tick = 0;
    }

    if (candles.length > 40) candles.shift();

    drawChart();
    calculatePL();
}

// === DRAW CHART ===
function drawChart() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // GRID
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1;

    for (let i = 0; i < canvas.height; i += 40) {
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(canvas.width, i);
        ctx.stroke();
    }

    const allPrices = candles.flatMap(c => [c.high, c.low]);
    const min = Math.min(...allPrices);
    const max = Math.max(...allPrices);
    const range = max - min || 1;

    const candleWidth = canvas.width / candles.length;

    candles.forEach((c, i) => {
        const x = i * candleWidth + candleWidth * 0.2;

        const openY = canvas.height - ((c.open - min) / range * canvas.height);
        const closeY = canvas.height - ((c.close - min) / range * canvas.height);
        const highY = canvas.height - ((c.high - min) / range * canvas.height);
        const lowY = canvas.height - ((c.low - min) / range * canvas.height);

        const isUp = c.close > c.open;

        // WICK
        ctx.strokeStyle = isUp ? '#00ff88' : '#ff4444';
        ctx.beginPath();
        ctx.moveTo(x + candleWidth * 0.3, highY);
        ctx.lineTo(x + candleWidth * 0.3, lowY);
        ctx.stroke();

        // BODY
        ctx.fillStyle = isUp ? '#00c853' : '#ff3d00';

        const bodyHeight = Math.abs(openY - closeY);
        ctx.fillRect(
            x,
            Math.min(openY, closeY),
            candleWidth * 0.6,
            bodyHeight < 2 ? 2 : bodyHeight
        );
    });
}

// === START LOOP ===
setInterval(updateMarket, 200);

// === DATA TRADING ===
let balance = 10000000;
let position = null;

// === BUKA POSISI ===
function openPosition(type) {
    if (position) {
        alert("Selesaikan posisi dulu!");
        return;
    }

    const tradeAmount = 1000000;

    if (balance < tradeAmount) {
        alert("Saldo tidak cukup!");
        return;
    }

    balance -= tradeAmount;
saveBalance();

    position = {
        type: type,
        entry: currentPrice,
        amount: tradeAmount
    };

    document.getElementById('balanceDisplay').innerText =
        "Rp " + balance.toLocaleString('id-ID');

    document.getElementById('positionCard').style.display = 'block';
    document.getElementById('mainActions').style.display = 'none';

    document.getElementById('posType').innerText = type;
    document.getElementById('entryPrice').innerText =
        Math.round(currentPrice).toLocaleString('id-ID');
}

// === HITUNG PROFIT LOSS ===
function calculatePL() {
    if (!position) return;

    let diff = (currentPrice - position.entry) / position.entry;

    if (position.type === 'SELL') diff = -diff;

    const pl = position.amount * diff;

    const el = document.getElementById('plDisplay');

    el.innerText =
        (pl >= 0 ? "+" : "") +
        "Rp " + Math.round(pl).toLocaleString('id-ID');

    el.className = pl >= 0 ? "profit" : "loss";
}

// === TUTUP POSISI ===
function closePosition() { 
saveBalance();
    if (!position) return;

    let diff = (currentPrice - position.entry) / position.entry;

    if (position.type === 'SELL') diff = -diff;

    const pl = position.amount * diff;
    const total = position.amount + pl;

    balance += total;

    // history
    const log = document.createElement('div');
    log.className = "history-item";
    log.innerHTML = `
        <span>${position.type}</span>
        <span class="${pl >= 0 ? 'profit' : 'loss'}">
            ${Math.round(pl).toLocaleString('id-ID')}
        </span>
    `;

    document.getElementById('historyList').prepend(log);

    // reset
    position = null;

    document.getElementById('balanceDisplay').innerText =
        "Rp " + balance.toLocaleString('id-ID');

    document.getElementById('positionCard').style.display = 'none';
    document.getElementById('mainActions').style.display = 'flex';
}

function updateBalanceUI() {
    document.getElementById('balanceDisplay').innerText =
        "Rp " + balance.toLocaleString('id-ID');
}

</script>

</body>
</html>
