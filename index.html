<html lang="id">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; font-family: 'Inter', sans-serif; color: #f8fafc; width: 1200px; margin: 0 auto; overflow-x: hidden; padding: 40px; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); }
        
        /* Combat Robots Styling */
        .robot-container { position: relative; width: 220px; height: 220px; margin: 0 auto 20px; }
        .robot-img { 
            width: 100%; height: 100%; object-fit: contain; 
            animation: floating 3.5s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(1deg); }
        }

        /* Neon & Box Styling */
        .neon-blue { border-bottom: 5px solid #3b82f6; box-shadow: 0 10px 40px -10px rgba(59, 130, 246, 0.4); }
        .neon-red { border-bottom: 5px solid #ef4444; box-shadow: 0 10px 40px -10px rgba(239, 68, 68, 0.4); }
        
        /* Intro Animation Video Box */
        .video-box { width: 100%; height: 400px; position: relative; border-radius: 50px; overflow: hidden; margin: 40px 0; border: 1px solid rgba(255,255,255,0.1); background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }

        .intro-overlay {
            position: absolute; inset: 0; display: flex; flex-col; items-center; justify-center;
            background: radial-gradient(circle, transparent 20%, #020617 100%);
            animation: fadeOutIntro 4s forwards; pointer-events: none;
        }
        .glitch-text {
            font-size: 80px; font-weight: 900; color: #fbbf24; letter-spacing: 15px;
            text-shadow: 2px 2px #ef4444, -2px -2px #3b82f6;
            animation: glitch 0.3s infinite, zoomOut 2s ease-out forwards;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); }
            40% { transform: translate(-3px, -2px); }
            60% { transform: translate(3px, 2px); }
            80% { transform: translate(3px, -2px); }
            100% { transform: translate(0); }
        }
        @keyframes zoomOut { from { transform: scale(2); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes fadeOutIntro { 0%, 70% { opacity: 1; } 100% { opacity: 0.2; } }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>

            <div class="h-16 w-16 bg-yellow-500 rounded-2xl flex items-center justify-center font-black text-black text-3xl font-orbitron shadow-[0_0_30px_rgba(234,179,8,0.4)]">E</div>

                <h2 id="playerID" class="font-orbitron text-2xl font-black text-white italic tracking-widest uppercase">MEMUAT ID...</h2>

            </div>
            <h3 class="text-3xl font-orbitron font-black mb-8 text-blue-400 tracking-widest uppercase">STRIKER A<br><span class="text-sm font-bold text-white/50">(SHOTGUN UNIT)</span></h3>
            <input type="number" id="amtA" class="w-full bg-slate-950 border border-slate-800 p-6 rounded-2xl mb-8 text-center text-3xl font-orbitron font-bold text-white outline-none focus:border-blue-500 transition-all" placeholder="0">
            <button onclick="placeBet('A')" class="w-full bg-blue-600 hover:bg-blue-500 py-6 rounded-2xl font-black font-orbitron text-2xl shadow-xl active:scale-95 transition-all">DEPLOΥ UNIT A</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCHr0eemIkfHNFDUkSaFDklp_c1OgmSnl8",
            databaseURL: "https://mybro-9ba5f-default-rtdb.firebaseio.com",
            projectId: "mybro-9ba5f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myID = localStorage.getItem('laga_player_id') || 'PLAYER-' + Math.floor(1000 + Math.random() * 9000);
        localStorage.setItem('laga_player_id', myID);
        document.getElementById('playerID').innerText = myID;

        const myRef = ref(db, 'users/' + myID);
        let myBalance = 0;

        onValue(myRef, (snap) => {
            if (!snap.exists()) { set(myRef, { balance: 0 }); }
            else {
                myBalance = snap.val().balance || 0;
                document.getElementById('balanceTxt').innerText = `Rp ${myBalance.toLocaleString('id-ID')}`;
            }
        });

        onValue(ref(db, 'match/result'), (snap) => {
            const winner = snap.val();
            if (!winner) return;

            const side = localStorage.getItem('last_side');
            const amt = parseInt(localStorage.getItem('last_amt') || 0);

            if (side === winner && amt > 0) {
                update(myRef, { balance: myBalance + (amt * 2) });
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                Swal.fire({ title: 'VICTORY! 🏆', text: `Target Eliminasi! Hadiah masuk.`, icon: 'success', background: '#020617', color: '#fbbf24' });
            } else if (side) {
                Swal.fire({ title: 'DEFEAT 💀', text: 'Unit Hancur. Coba lagi!', icon: 'error', background: '#020617', color: '#ef4444' });
            }
            localStorage.removeItem('last_side');
            localStorage.removeItem('last_amt');
        });

        window.placeBet = (side) => {
            const amt = parseInt(document.getElementById('amt' + side).value);
            if (!amt || amt > myBalance) return Swal.fire('Gagal', 'Kredit tidak cukup!', 'error');
            
            localStorage.setItem('last_side', side);
            localStorage.setItem('last_amt', amt);
            update(myRef, { balance: myBalance - amt });
            document.getElementById('amt' + side).value = "";
            Swal.fire('DEPLOYED', `Unit ${side} Menuju Target!`, 'success');
        };
    </script>
